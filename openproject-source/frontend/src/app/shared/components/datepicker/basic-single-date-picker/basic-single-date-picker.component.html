@if (!mobile) {
  <input
    #input
    type="text"
    autocomplete="off"
    class="spot-input"
    data-filter--filters-form-target="singleDay"
    [ngClass]="inputClassNames"
    [ngModel]="value"
    [attr.data-value]="value"
    [attr.data-action]="dataAction"
    [id]="id"
    [name]="name"
    [attr.name]="name"
    [required]="required"
    [disabled]="disabled"
    [placeholder]="placeholder"
    (input)="changeValueFromInput($event.target.value)"
    (focus)="showDatePicker()"
    (click)="sentCalendarToTopLayer()"
    [attr.data-remote-field-key]="remoteFieldKey"
    />
}

@if (mobile) {
  <input
    type="date"
    class="spot-input"
    data-filter--filters-form-target="singleDay"
    [ngClass]="inputClassNames"
    [attr.data-value]="value"
    [attr.data-action]="dataAction"
    [id]="id"
    [name]="name"
    [attr.name]="name"
    [required]="required"
    [disabled]="disabled"
    [placeholder]="placeholder"
    [ngModel]="value"
    (ngModelChange)="changeValueFromInput($event)"
    />
}
