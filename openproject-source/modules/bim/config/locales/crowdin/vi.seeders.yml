      welcome:
        title: Chào mừng bạn đến với phiên bản OpenProject BIM!
        text: |
          Kiểm tra các dự án demo để bắt đầu với một số ví dụ.

          * [(Demo) Construction project]({{opSetting:base_url}}/projects/demo-construction-project): Lập kế hoạch, quy trình BIM, quản lý BCF và xây dựng, tất cả chỉ trong nháy mắt.
              * [(Demo) Planning & constructing]({{opSetting:base_url}}/projects/demo-planning-constructing-project): Quy hoạch cổ điển và quản lý xây dựng.
              * [(Demo) Bim project]({{opSetting:base_url}}/projects/demo-bim-project): Quy trình và điều phối BIM.
                  * [(Demo) BCF management]({{opSetting:base_url}}/projects/demo-bcf-management-project): Quản lý BCF.

          Ngoài ra, bạn có thể tạo một khoảng trống [new project]({{opSetting:base_url}}/projects/new).

          Không bao giờ ngừng hợp tác. Với nguồn mở và tư duy cởi mở.

          Bạn có thể thay đổi văn bản chào mừng này [here]({{opSetting:base_url}}/admin/settings/general).
