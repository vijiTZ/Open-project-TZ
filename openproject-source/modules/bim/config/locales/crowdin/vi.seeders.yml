          work_packages:
            item_0:
              subject: Khởi động dự án tạo mô hình BIM
              description: |-
                Khởi động dự án khởi động bắt đầu dự án trong công ty của bạn. Toàn bộ nhóm dự án nên được mời đến Khởi động để nhận thông tin sơ bộ.

                Bước tiếp theo có thể là kiểm tra lịch trình và điều chỉnh các cuộc hẹn, bằng cách xem [Biểu đồ Gantt]({{opSetting:base_url}}/projects/demo-bim-project/work_packages?query_props=%7B%22c%22%3A%5B%22id%22%2C%22subject%22%2C%22startDate%22%2C%22dueDate%22%5D%2C%22tv%22%3Atrue%2C%22tzl%22%3A%22weeks%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22status%22%2C%22o%22%3A%22o%22%2C%22v%22%3A%5B%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%7D).
            item_1:
              subject: Chuẩn bị dự án
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
              children:
                item_0:
                  subject: Thu thập dữ liệu và thông tin cụ thể của dự án cho mô hình BIM
                  description: |-
                    ## Mục tiêu

                    * Xác định chiến lược thông tin cho khách hàng (ví dụ: bằng cách sử dụng các câu hỏi bằng ngôn ngữ đơn giản)
                    * Nếu được cung cấp, hãy phân tích yêu cầu thông tin khách hàng đối với mô hình BIM
                    * Xác định chiến lược cung cấp thông tin theo nhu cầu của khách hàng

                    ## Mô tả

                    * Phân tích nhu cầu và mục tiêu của khách hàng khi sử dụng phương pháp BIM
                    * Kết quả của nhiệm vụ này là:
                    * Yêu cầu của dự án
                    * Chiến lược cho giai đoạn giao hàng
                    * ...
                item_1:
                  subject: Tạo kế hoạch thực hiện BIM
                  description: |-
                    # mục tiêu

                    * Kế hoạch thực hiện BIM sẽ được xác định theo thông số kỹ thuật yêu cầu trao đổi (ERS)
                    * Tất cả các thành viên trong nhóm và đối tác đều có kế hoạch về cách đạt được từng mục tiêu của dự án

                    # Mô tả

                    * Tùy thuộc vào các trường hợp sử dụng được xác định, Sổ tay hướng dẫn cung cấp thông tin riêng lẻ sẽ được xác định
                    * Để xử lý các giao diện công nghệ, cấu trúc liên kết phần mềm sẽ được xác định, phân tích và xác minh
                    * ...
                item_2:
                  subject: Hoàn thành kế hoạch thực hiện BIM
                  description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_2:
              subject: Kết thúc giai đoạn chuẩn bị
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_3:
              subject: Tạo mô hình BIM ban đầu
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
              children:
                item_0:
                  subject: Lập mô hình mô hình BIM ban đầu
                  description: |-
                    # mục tiêu

                    * Lập mô hình mô hình BIM ban đầu
                    * Tạo mô hình BIM cho toàn bộ nhóm dự án

                    # Mô tả

                    * Theo dữ liệu thu thập được từ khách hàng, mô hình ban đầu sẽ được mô hình hóa
                    * Mô hình phải được mô hình hóa theo Ma trận LOD và chứa thông tin cần thiết
                    * ...
                item_1:
                  subject: Kiểm tra và sửa đổi mô hình ban đầu, nội bộ
                  description: |-
                    # mục tiêu

                    * Đệ trình mô hình BIM theo tiêu chuẩn đã xác định

                    # Mô tả

                    * Mô hình sẽ được kiểm tra, tuân theo các tiêu chuẩn đã xác định (quy ước, LOD, ...) và sửa đổi
                    * ...
                item_2:
                  subject: Gửi mô hình BIM ban đầu
                  description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_4:
              subject: Lập mô hình, chu kỳ đầu tiên
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
              children:
                item_0:
                  subject: Tham khảo các mô hình BIM bên ngoài
                  description: |-
                    # mục tiêu

                    * Có nền tảng phát triển mô hình nội bộ/ đưa ra câu trả lời
                    * Sử dụng mô hình bên ngoài để phát triển mô hình bên trong

                    # Mô tả

                    * Mô hình bên ngoài sẽ được tham chiếu trong nền tảng BIM, do đó được sử dụng để mô hình hóa mô hình bên trong
                    * ...
                item_1:
                  subject: Lập mô hình mô hình BIM
                  description: |-
                    # mục tiêu

                    * Tạo mô hình BIM cho dự án
                    * Tạo mô hình BIM cho toàn bộ nhóm dự án

                    # Mô tả

                    * Mô hình sẽ được tạo theo kế hoạch thực hiện BIM
                    * ...
                item_2:
                  subject: Chu kỳ đầu tiên, kiểm tra và sửa đổi mô hình nội bộ
                  description: |-
                    # mục tiêu

                    * Đệ trình mô hình BIM theo tiêu chuẩn đã xác định

                    # Mô tả

                    * Mô hình sẽ được kiểm tra, theo các tiêu chuẩn đã xác định (quy ước, LOD, ...) và sửa đổi.
                    * ...
                item_3:
                  subject: Đệ trình mô hình BIM
                  description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_5:
              subject: Phối hợp, chu kỳ đầu tiên
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
              children:
                item_0:
                  subject: Phối hợp các mô hình BIM khác nhau
                  description: |-
                    # mục tiêu

                    * Lắp ráp các mô hình BIM khác nhau của toàn bộ nhóm dự án
                    * Phối hợp các vấn đề được xác định

                    # Mô tả

                    * Các mô hình BIM khác nhau sẽ được lắp ráp và kiểm tra
                    * Các vấn đề cụ thể của mô hình được xác định sẽ được thông báo qua tệp BCF
                    * ...
                item_1:
                  subject: Quản lý vấn đề, chu kỳ đầu tiên
                item_2:
                  subject: Kết thúc phối hợp, chu kỳ đầu tiên
                  description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_6:
              subject: Lập mô hình & điều phối, chu kỳ thứ hai
              description: "## Mục tiêu\r\n\r\n* ...\r\n\r\n## Mô tả\r\n\r\n* \\ ..."
            item_7:
              subject: Lập mô hình & điều phối, ... chu trình
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_8:
              subject: Lập mô hình & điều phối, chu trình (n-th trừ 1)
              description: "## Mục tiêu\r\n\r\n* ...\r\n\r\n## Mô tả\r\n\r\n* \\ ..."
            item_9:
              subject: Lập mô hình và điều phối chu kỳ thứ n
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_10:
              subject: Hoàn thiện mô hình hóa và điều phối, chu kỳ thứ n
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
            item_11:
              subject: Sử dụng mô hình cho giai đoạn xây dựng
              children:
                item_0:
                  subject: Mô hình bàn giao cho đội thi công
                  description: |-
                    ## Mục tiêu

                    * Mọi người đều biết mô hình và nhiệm vụ của mình
                    * Mọi người đều nhận được tất cả thông tin liên quan, dựa trên mô hình
                    * ...

                    ## Mô tả

                    * Lễ khai mạc tại công trường bao gồm phần giới thiệu về mô hình
                    * Tất cả các đối tượng cần có thông tin cần thiết cho nhiệm vụ được giao. Nếu không, cần phải làm giàu dữ liệu của mô hình
                    * ...
                item_1:
                  subject: Xây dựng tòa nhà
                  description: |-
                    ## Mục tiêu

                    * Các vấn đề mới phát hiện trên công trường sẽ được xử lý dựa trên mô hình
                    * Các vấn đề sẽ được ghi lại bằng cách sử dụng tệp BCF và mô hình BIM

                    ## Mô tả

                    * Các vấn đề mới sẽ được ghi lại bằng tệp BCF làm ghi chú dán cho mô hình
                    * Các tệp BCF sẽ được sử dụng để chỉ định, theo dõi và khắc phục sự cố
                    * ...
