                  text: |
                    Chúng tôi rất vui vì bạn đã tham gia! Chúng tôi đề xuất bạn thử một số bước để bắt đầu với OpenProject.

                    Nhưng trước khi bạn bắt đầu ngay lập tức, bạn nên biết rằng dự án mẫu này được chia thành hai dự án khác nhau:

                    1.  [Dự án xây dựng]({{opSetting:base_url}}/projects/demo-planning-constructing-project): Tại đây bạn sẽ tìm thấy các vai trò truyền thống, một số quy trình và gói công việc cho dự án xây dựng của bạn.
                    2.  [Tạo mô hình BIM]({{opSetting:base_url}}/projects/demo-bim-project): Dự án này cũng cung cấp các vai trò, quy trình và gói công việc nhưng đặc biệt trong ngữ cảnh BIM.

                    _Hãy thử các bước sau:_

                    1.  _Mời các thành viên mới vào dự án của bạn_: → Truy cập [Thành viên]({{opSetting:base_url}}/projects/demo-construction-project/members) trong điều hướng dự án.
                    2.  _Xem công việc trong các dự án của bạn_: → Truy cập [Gói công việc]({{opSetting:base_url}}/projects/demo-construction-project/work_packages?query_props=%7B%22c%22%3A%5B%22type%22%2C%22id%22%2C%22subject%22%2C%22status%22%2C%22assignee%22%2C%22priority%22%5D%2C%22hl%22%3A%22priority%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22bcfIssueAssociated%22%2C%22o%22%3A%22%3D%22%2C%22v%22%3A%5B%22f%22%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%2C%22dr%22%3A%22list%22%7D) trong điều hướng dự án.
                    3.  _Tạo một gói công việc mới_: → Truy cập [Gói công việc → Tạo mới]({{opSetting:base_url}}/projects/demo-construction-project/work_packages/new?query_props=%7B%22c%22%3A%5B%22type%22%2C%22id%22%2C%22subject%22%2C%22status%22%2C%22assignee%22%2C%22priority%22%5D%2C%22hl%22%3A%22priority%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22bcfIssueAssociated%22%2C%22o%22%3A%22%3D%22%2C%22v%22%3A%5B%22f%22%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%2C%22dr%22%3A%22list%22%7D&type=11).
                    4.  _Tạo và cập nhật biểu đồ Gantt_: → Truy cập [Biểu đồ Gantt]({{opSetting:base_url}}/projects/demo-construction-project/work_packages?query_props=%7B%22c%22%3A%5B%22type%22%2C%22id%22%2C%22subject%22%2C%22assignee%22%2C%22responsible%22%5D%2C%22tv%22%3Atrue%2C%22tzl%22%3A%22weeks%22%2C%22hl%22%3A%22priority%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%2C%22dr%22%3A%22list%22%7D) trong điều hướng dự án.
                    5.  _Kích hoạt các module khác_: → Truy cập [Cài đặt dự án → Các module]({{opSetting:base_url}}/projects/demo-construction-project/settings/modules).
                    6.  _Xem qua chế độ xem ô để có cái nhìn tổng quan về các vấn đề BCF của bạn:_ → Truy cập [Gói công việc]({{opSetting:base_url}}/projects/demo-construction-project/work_packages?query_props=%7B%22c%22%3A%5B%22type%22%2C%22id%22%2C%22subject%22%2C%22status%22%2C%22assignee%22%2C%22priority%22%5D%2C%22hl%22%3A%22priority%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22id%3Aasc%22%2C%22f%22%3A%5B%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%2C%22dr%22%3A%22card%22%7D)
