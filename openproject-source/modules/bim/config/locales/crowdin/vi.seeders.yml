              subject: Đánh giá cơ bản
              description: Loại này được phân cấp theo cấp bậc cha của các loại &quot;Clash&quot; và &quot;Request&quot;, do đó đại diện cho một ghi chú chung.
              children:
                item_0:
                  subject: Thu thập thông tin dự án đầu tiên
                  description: |-
                    ## Mục tiêu

                    * Xác định nhiệm vụ dựa trên nhu cầu của khách hàng
                    * Khung thời gian và ước tính chi phí sẽ được xác định

                    ## Mô tả

                    * Xác định nhu cầu của khách hàng bằng cách tổ chức một buổi hội thảo với họ
                    * Mỗi nhu cầu sẽ đại diện cho một nhiệm vụ với các gói công việc tương ứng
                    * Lập dự toán chi phí và khung thời gian
                item_1:
                  subject: Tóm tắt kết quả
                  description: |-
                    ## Mục tiêu

                    * Tạo một cái nhìn tổng quan hữu ích về kết quả
                    * Kiểm tra những gì đã được thực hiện và tóm tắt kết quả
                    * Truyền đạt tất cả các kết quả có liên quan với khách hàng
                    * Xác định các điều kiện biên cơ bản của dự án

                    ## Mô tả

                    * Mỗi chủ đề có cái nhìn tổng quan riêng và sẽ được sử dụng làm danh mục kết quả
                    * Tổng quan này thông báo cho tất cả người tham gia về các quyết định được đưa ra
