          work_packages:
            item_0:
              subject: Project kick off creating BIM model
              description: |-
                The project Kickoff initializes the start of the project in your company. The whole project team should be invited to the Kickoff for a first briefing.

                The next step could be to check out the timetable and adjusting the appointments, by looking at the [Gantt chart]({{opSetting:base_url}}/projects/demo-bim-project/work_packages?query_props=%7B%22c%22%3A%5B%22id%22%2C%22subject%22%2C%22startDate%22%2C%22dueDate%22%5D%2C%22tv%22%3Atrue%2C%22tzl%22%3A%22weeks%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22status%22%2C%22o%22%3A%22o%22%2C%22v%22%3A%5B%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%7D).
            item_1:
              subject: Project preparation
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
              children:
                item_0:
                  subject: Gathering the project specific data and information for the BIM model
                  description: |-
                    ## Obiectiv

                    * Identificarea strategiei de informare a clientului (de exemplu, prin utilizarea întrebărilor în limbaj simplu)
                    * Dacă sunt furnizate, analizarea cerințelor de informare ale clientului pentru modelul BIM
                    * Definirea unei strategii de furnizare a informațiilor în funcție de nevoile clientului

                    ## Descriere

                    * Analizarea nevoilor și a obiectivelor clienților pentru utilizarea metodologiei BIM
                    * Rezultatele acestei sarcini ar trebui să fie:
                    * Cerințele pentru proiect
                    * O strategie pentru faza de livrare
                    * ...
                item_1:
                  subject: Crearea planului de execuție BIM
                  description: |-
                    # Obiectivul

                    * Un plan de execuție BIM va fi definit în conformitate cu specificațiile privind cerințele de schimb (ERS)
                    * Toți membrii echipei și partenerii au un plan privind modul de atingere a fiecăruia dintre obiectivele proiectului

                    # Descriere

                    * În funcție de cazurile de utilizare a identificării, Manualele individuale de livrare a informațiilor vor fi definite
                    * Pentru a gestiona interfețele tehnologice, un software topologie va fi definit și analizat și verificat
                    * ...
                item_2:
                  subject: Finalizarea planului de execuție BIM
                  description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_2:
              subject: Sfârșit fază pregătire
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_3:
              subject: Creating initial BIM model
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
              children:
                item_0:
                  subject: Realizare modelului BIM inițial
                  description: |-
                    # Obiectiv

                    * Realizarea modelului BIM inițial
                    * Crearea unui model BIM pentru întreaga echipă de proiect

                    # Descriere

                    *  Modelul inițial va fi realizat conform datelor colectate de la client
                    * Modelul va fi realizat în conformitate cu matricele LOD și va conține informațiile necesare
                    * ...
                item_1:
                  subject: Initial, internal model check and revising
                  description: |-
                    # Obiectiv

                    * Trimiterea unui model BIM în conformitate cu standardele definite

                    # Descriere

                    * Modelul va fi verificat, în conformitate cu standardele definite (convenții, LOD, ...) și revizuit
                    * ...
                item_2:
                  subject: Trimiterea modelului BIM inițial
                  description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_4:
              subject: Modelling, first cycle
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
              children:
                item_0:
                  subject: Referencing external BIM models
                  description: |-
                    # Goal

                    *   Having a foundation for developing the internal model/ offering answers
                    *   Using the external model to develop the internal model

                    # Description

                    *   The external model will be referenced in the BIM platform, thus used for modelling the internal model
                    *   ...
                item_1:
                  subject: Realizare modelului BIM inițial
                  description: |-
                    # Obiectiv

                    * Crearea unui model BIM pentru proiect
                    * Crearea unui model BIM pentru întreaga echipă de proiect

                    # Descriere

                    * Modelul va fi creat în conformitate cu planul de execuție BIM
                    * ...
                item_2:
                  subject: First Cycle, internal model check and revising
                  description: |-
                    # Goal

                    *   Submitting a BIM model according to the defined standards

                    # Description

                    *   The model shall be checked, according to the defined standards (conventions, LOD, ...) and revised.
                    *   ...
                item_3:
                  subject: Submitting BIM model
                  description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_5:
              subject: Coordination, first cycle
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
              children:
                item_0:
                  subject: Coordinate the different BIM models
                  description: |-
                    # Goal

                    *   Assemble the different BIM models of the whole project team
                    *   Coordinate the identified issues

                    # Description

                    *   The different BIM models will be assembled and checked
                    *   The identified model specific issues will be communicated via BCF files
                    *   ...
                item_1:
                  subject: Issue management, first cycle
                item_2:
                  subject: Finishing coordination, first cycle
                  description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_6:
              subject: Modelling & coordinating, second cycle
              description: "## Goal\r\n\r\n*   ...\r\n\r\n## Description\r\n\r\n* \\  ..."
            item_7:
              subject: Modelling & coordinating, ... cycle
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_8:
              subject: Modelling & coordinating, (n-th minus 1) cycle
              description: "## Goal\r\n\r\n*   ...\r\n\r\n## Description\r\n\r\n* \\  ..."
            item_9:
              subject: Modelling & coordinating n-th cycle
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_10:
              subject: Finishing modelling & coordinating, n-th cycle
              description: This type is hierarchically a parent of the types &quot;Clash&quot; and &quot;Request&quot;, thus represents a general note.
            item_11:
              subject: Utilizează model pentru faza construcție
              children:
                item_0:
                  subject: Handover model for construction crew
                  description: |-
                    ## Goal

                    *   Everyone knows the model and their tasks
                    *   Everybody gets all the relevant information, model based
                    *   ...

                    ## Description

                    *   The Kickoff on the construction site includes an introduction to the model
                    *   All the objects should have the information needed for the assigned tasks. If not, data enrichment of the model needs to be done
                    *   ...
                item_1:
                  subject: Construct the building
                  description: |-
                    ## Obiectiv

                    * Probleme noi realizate pe site-ul de construcție vor fi gestionate de modelul
                    * Problemele vor fi documentate folosind fișierele BCF și modelul BIM

                    ## Descriere

                    * Probleme noi vor fi documentate folosind fișierele BCF ca note sticky pentru modelul
                    * Fișierele BCF vor fi folosite pentru atribuire, urmărește și corectează problemele
                    * ...
                item_2:
                  subject: Finish construction
            item_12:
              subject: Gestionare probleme, fază construcție
            item_13:
              subject: Handover for Facility Management
              description: |-
                ## Goal

                *   The BIM model will be used for the Facility Management
                *   The model provides all the relevant information for commissioning and operating the building
                *   ...

                ## Description

                *   The model contains the relevant information for the facility manager
                *   The model can be used for the operating system of the building
                *   ...
            item_14:
              subject: Asset Management
              description: Enjoy your building :)
