                  name: Velkommen
              item_1:
                options:
                  name: At komme gang
                  text: |
                    Vi er glade for, at du er med! Vi foreslår, at du prøver et par ting for at komme i gang med OpenProject.

                    Dette demoprojekt viser BCF-styringsfunktioner.

                    Prøv følgende trin:_

                    1.  _Invitér nye medlemmer til dit projekt:_ → Gå til [Medlemmer]({{opSetting:base_url}}/projects/demo-bcf-management-project/members?show_add_members=true) i projektnavigationen.
                    2.  _Upload og vis 3D-modeller i IFC-format:_ → Gå til [BCF]({{opSetting:base_url}}/projects/demo-bim-project/bcf) i projektnavigationen.
                    3.  _Create and manage BCF issues linked directly in the IFC model:_ → Gå til [BCF]({{opSetting:base_url}}/projects/demo-bim-project/bcf) → Create.
                    4.  _Vis BCF-filerne i dit projekt:_ → Gå til [BCF]({{opSetting:base_url}}/projects/demo-bcf-management-project/work_packages?query_props=%7B%22c%22%3A%5B%22type%22%2C%22id%22%2C%22subject%22%2C%22status%22%2C%22assignee%22%2C%22priority%22%5D%2C%22hl%22%3A%22status%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22id%3Aasc%22%2C%22f%22%3A%5B%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%2C%22dr%22%3A%22card%22%7D) i projektnavigationen.
                    5.  _Load dine BCF-filer:_ → Gå til [BCF → Import.]({{opSetting:base_url}}/projects/demo-bcf-management-project/issues/upload)
                    6.  _Create and update a Gantt chart:_ → Go to [Gantt chart]({{opSetting:base_url}}/projects/demo-bcf-management-project/work_packages?query_props=%7B%22c%22%3A%5B%22id%22%2C%22subject%22%2C%22startDate%22%2C%22dueDate%22%5D%2C%22tv%22%3Atrue%2C%22tzl%22%3A%22days%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22status%22%2C%22o%22%3A%22o%22%2C%22v%22%3A%5B%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%7D) i projektnavigationen.
                    7.  _Aktiver yderligere moduler:_ → Gå til [Projektindstillinger → Moduler]({{opSetting:base_url}}/projects/demo-bcf-management-project/settings/modules)
                    8.  _Er du vild med den agile tilgang? Opret et board:_ → Gå til [Boards]({{opSetting:base_url}}/projects/demo-bcf-management-project/boards).

                    Her finder du vores [Brugervejledninger](https://www.openproject.org/docs/user-guide/).
                    Lad os vide, hvis du har spørgsmål eller brug for support. Kontakt os gerne: [support\[at\]openproject.com](mailto:support@openproject.com).
