          work_packages:
            item_0:
              subject: Projektstart med oprettelse af BIM-model
              description: |-
                Projektets kick off markerer starten på projektet i din virksomhed. Alle, der er en del af projektet, bør inviteres til kick off for at få en første briefing.

                Det næste skridt kunne være at tjekke tidsplanen og justere aftalerne ved at se på [Gantt-diagrammet]({{opSetting:base_url}}/projects/demo-construction-project/work_packages?query_props=%7B%22c%22%3A%5B%22id%22%2C%22subject%22%2C%22startDate%22%2C%22dueDate%22%5D%2C%22tv%22%3Atrue%2C%22tzl%22%3A%22weeks%22%2C%22hi%22%3Atrue%2C%22g%22%3A%22%22%2C%22t%22%3A%22startDate%3Aasc%22%2C%22f%22%3A%5B%7B%22n%22%3A%22status%22%2C%22o%22%3A%22o%22%2C%22v%22%3A%5B%5D%7D%5D%2C%22pa%22%3A1%2C%22pp%22%3A100%7D).
            item_1:
              subject: Forberedelse af projektet
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
              children:
                item_0:
                  subject: Indsamling af projektspecifikke data og oplysninger til BIM-modellen
                  description: |-
                    ## Mål

                    * Identificer kundens informationsstrategi (f.eks. ved hjælp af spørgsmål i almindeligt sprog)
                    * Hvis det er muligt, analyser kundens informationskrav til BIM-modellen
                    * Definer en informationsleveringsstrategi i henhold til kundens behov

                    ## Beskrivelse

                    * Analyser kundens behov og mål for brug af BIM-metoden
                    * Resultatet af denne opgave bør være:
                    * Kravene til projektet
                    * En strategi for leveringsfasen
                    * ...
                item_1:
                  subject: Oprettelse af BIM-udførelsesplanen
                  description: |-
                    # Mål

                    * En BIM-eksekveringsplan vil blive defineret i henhold til specifikationerne for udvekslingskrav (ERS)
                    * Alle teammedlemmer og partnere har en plan for, hvordan de skal nå hvert af projektets mål

                    # Beskrivelse

                    * Afhængigt af de identificerede brugssager vil de individuelle informationsleveringsmanualer blive defineret
                    * For at håndtere de teknologiske grænseflader vil en softwaretopologi blive defineret og analyseret og verificeret
                    * ...
                item_2:
                  subject: Afslutning af BIM-udførelsesplanen
                  description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_2:
              subject: Afslutning af forberedelsesfasen
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_3:
              subject: Oprettelse af indledende BIM-model
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
              children:
                item_0:
                  subject: Modellering af indledende BIM-model
                  description: |-
                    # Mål

                    * Modellering af den oprindelige BIM-model
                    * Oprettelse af en BIM-model for hele projektteamet

                    # Beskrivelse

                    * Ifølge de indsamlede data fra kunden vil den oprindelige model blive modelleret
                    * Modellen skal modelleres i henhold til LOD-matricerne og indeholde de nødvendige oplysninger
                    * ...
                item_1:
                  subject: Indledende, intern modelkontrol og revision
                  description: |-
                    # Mål

                    * Indsendelse af en BIM-model i henhold til de definerede standarder

                    # Beskrivelse

                    * Modellen skal kontrolleres i henhold til de definerede standarder (konventioner, LOD, ...) og revideres
                    * ...
                item_2:
                  subject: Indsendelse af indledende BIM-model
                  description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_4:
              subject: Modellering, første cyklus
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
              children:
                item_0:
                  subject: Henvisning til eksterne BIM-modeller
                  description: |-
                    # Mål

                    * At have et grundlag for at udvikle den interne model/ tilbyde svar
                    * At bruge den eksterne model til at udvikle den interne model

                    # Beskrivelse

                    * Den eksterne model vil blive refereret i BIM-platformen og dermed brugt til modellering af den interne model
                    * ...
                item_1:
                  subject: Modellering af BIM-modellen
                  description: |-
                    # Mål

                    * Oprettelse af en BIM-model for projektet
                    * Oprettelse af en BIM-model for hele projektteamet

                    # Beskrivelse

                    * Modellen vil blive oprettet i henhold til BIM-eksekveringsplanen
                    * ...
                item_2:
                  subject: Første cyklus, intern modelkontrol og revision
                  description: |-
                    # Mål

                    * Indsendelse af en BIM-model i henhold til de definerede standarder

                    # Beskrivelse

                    * Modellen skal kontrolleres i henhold til de definerede standarder (konventioner, LOD, ...) og revideres.
                    * ...
                item_3:
                  subject: Indsendelse af BIM-model
                  description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_5:
              subject: Koordinering, første cyklus
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
              children:
                item_0:
                  subject: Koordiner de forskellige BIM-modeller
                  description: |-
                    # Mål

                    * Samle de forskellige BIM-modeller fra hele projektteamet
                    * Koordinere de identificerede problemer

                    # Beskrivelse

                    * De forskellige BIM-modeller samles og kontrolleres
                    * De identificerede modelspecifikke problemer kommunikeres via BCF-filer
                    * ...
                item_1:
                  subject: Problemstyring, første cyklus
                item_2:
                  subject: Efterbehandlingskoordinering, første cyklus
                  description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_6:
              subject: Modellering og koordinering, anden cyklus
              description: "## Mål\r\n\r\n* ...\r\n\r\n## Beskrivelse\r\n\r\n* \\ ..."
            item_7:
              subject: Modellering og koordinering, ... cyklus
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_8:
              subject: Modellering og koordinering, (n-te minus 1) cyklus
              description: "## Mål\r\n\r\n* ...\r\n\r\n## Beskrivelse\r\n\r\n* \\ ..."
            item_9:
              subject: Modellering og koordinering af n-te cyklus
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_10:
              subject: Færdiggørelse af modellering og koordinering, n'te cyklus
              description: Denne type er hierarkisk overordnet typerne &quot;Clash&quot; og &quot;Request&quot;, og repræsenterer således en generel note.
            item_11:
              subject: Brug modellen til byggefasen
              children:
                item_0:
                  subject: Overdragelsesmodel til byggehold
                  description: |-
                    ## Mål

                    * Alle kender modellen og deres opgaver
                    * Alle får al relevant information, modelbaseret
                    * ...

                    ## Beskrivelse

                    * Kickoff på byggepladsen omfatter en introduktion til modellen
                    * Alle objekter bør have de oplysninger, der er nødvendige for de tildelte opgaver. Hvis ikke, skal modellen beriges med data
                    * ...
                item_1:
                  subject: Konstruer bygningen
                  description: |-
                    ## Mål

                    * Nye problemer på byggepladsen vil blive håndteret modelbaseret
                    * Problemer vil blive dokumenteret ved hjælp af BCF-filer og BIM-modellen

                    ## Beskrivelse

                    * Nye problemer vil blive dokumenteret ved hjælp af BCF-filer som sticky notes til modellen
                    * BCF-filerne vil blive brugt til at tildele, spore og rette problemer
                    * ...
                item_2:
                  subject: Færdiggør konstruktion
            item_12:
              subject: Problemstyring, byggefase
            item_13:
              subject: Overdragelse til Facility Management
              description: |-
                ## Mål

                * BIM-modellen vil blive brugt til Facility Management
                * Modellen indeholder alle relevante oplysninger til idriftsættelse og drift af bygningen
                * ...

                ## Beskrivelse

                * Modellen indeholder de relevante oplysninger for facility manageren
                * Modellen kan bruges til bygningens driftssystem
                * ...
            item_14:
              subject: Forvaltning af aktiver
              description: Nyd din bygning :)
