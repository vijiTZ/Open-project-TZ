          Tất cả các tài liệu hiện có có thể không thể truy cập được. Vui lòng chỉ thực hiện việc này nếu bạn chắc chắn muốn tắt
          cộng tác thời gian thực và trình soạn thảo BlockNote trong trường hợp này.
        confirmation_checkbox_message: Tôi hiểu rằng tôi có thể mất dữ liệu vĩnh viễn
        success: Cộng tác thời gian thực đã bị vô hiệu hóa.
