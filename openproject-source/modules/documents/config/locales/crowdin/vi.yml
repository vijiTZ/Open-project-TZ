          Tất cả các tài liệu mới sẽ dựa trên trình chỉnh sửa mới (BlockNote) và sẽ yêu cầu kết nối hoạt động với
          Máy chủ hocuspocus.
        primary_action: Cho phép cộng tác theo thời gian thực
        success: Cộng tác thời gian thực đã được kích hoạt.
