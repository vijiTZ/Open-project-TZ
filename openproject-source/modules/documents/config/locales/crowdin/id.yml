          label: URL server Hocuspocus
          caption: The WebSocket address of a working Hocuspocus server.
          invalid_scheme: Must use a WebSocket protocol (ws:// or wss://).
        hocuspocus_server_secret:
          label: Klien rahasia
          caption: Salin kode rahasia yang disediakan oleh server Hocuspocus.
        hocuspocus_server: Server Hocuspocus
