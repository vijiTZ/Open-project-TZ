          description: |-
            Saat diaktifkan, kolaborasi secara langusng memungkinkan beberapa pengguna untuk menyunting dokumen secara bersamaan.
            Fitur ini memerlukan server %{hocuspocus_server_link} yang berfungsi untuk beroperasi.
        banner:
          none_writable: Nilai-nilai ini dikonfigurasi melalui variabel lingkungan dan tidak dapat disunting di sini.
