        page_header:
          description: |-
            Etkinleştirildiğinde, gerçek zamanlı işbirliği birden fazla kullanıcının bir belgeyi aynı anda düzenlemesine olanak tanır.
            Çalışması için çalışan bir %{hocuspocus_server_link} gerekir.
        banner:
          none_writable: Bu değerler ortam değişkenleri aracılığıyla yapılandırılır ve burada düzenlenemez.
          some_unwritable: Bazı değerler ortam değişkenleri aracılığıyla yapılandırılır ve burada düzenlenemez.
        hocuspocus_server_url:
          label: Hocuspocus sunucu URL'si
          caption: The WebSocket address of a working Hocuspocus server.
          invalid_scheme: Must use a WebSocket protocol (ws:// or wss://).
        hocuspocus_server_secret:
          label: İstemci anahtarı
          caption: Hocuspocus sunucusu tarafından sağlanan sırrı yapıştırın.
        hocuspocus_server: Hocuspocus sunucusu
      enable_text_collaboration:
        heading: Gerçek zamanlı işbirliği etkin değil
        description: |-
          Etkinleştirildikten sonra, birden fazla kullanıcı aynı anda bir belge üzerinde birlikte çalışabilecektir.
          Tüm yeni belgeler yeni bir düzenleyiciye (BlockNote) dayanacak ve
          Hocuspocus sunucusuna çalışan bir bağlantı gerektirecektir.
        primary_action: Gerçek zamanlı işbirliğini etkinleştirin
        success: Gerçek zamanlı işbirliği etkinleştirildi.
      disable_text_collaboration_dialog:
        title: Gerçek zamanlı işbirliğini devre dışı bırakma
        heading: Gerçek zamanlı işbirliğini devre dışı mı bırakıyorsunuz?
        confirmation_message: |-
          Mevcut tüm belgeler erişilemez hale gelebilir. Lütfen bunu yalnızca
          gerçek zamanlı işbirliğini ve BlockNote düzenleyicisini bu durumda devre dışı bırakmak istediğinizden eminseniz yapın.
        confirmation_checkbox_message: Verileri kalıcı olarak kaybedebileceğimi anlıyorum
        success: Gerçek zamanlı işbirliği devre dışı bırakıldı.
