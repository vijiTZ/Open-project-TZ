it:
  plugin_openproject_meeting:
    name: Riunione OpenProject
    description: Questo modulo aggiunge funzioni per supportare le riunioni del progetto a OpenProject. Gli incontri possono essere programmati selezionando gli invitati dello stesso progetto per partecipare alla riunione. Si può creare un ordine del giorno e inviarlo agli invitati. Dopo la riunione, i partecipanti possono essere selezionati e i verbali possono essere creati in base all'ordine del giorno. Infine, i verbali possono essere inviati a tutti i partecipanti e agli invitati.
