      title: Cancella l'occorrenza della riunione
      heading: Cancellare questa occorrenza della riunione?
      confirmation_message_html: 'Qualsiasi informazione sulla riunione non contenuta nel modello andrà persa. Vuole continuare?

        '
      confirm_button: Cancella l'occorrenza
