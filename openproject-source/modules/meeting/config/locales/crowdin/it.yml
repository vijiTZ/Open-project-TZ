      title: Pianificate
      subtitle: 'Le seguenti riunioni sono pianificate nel calendario delle riunioni ricorrenti, ma non sono ancora aperte. Ogni volta che inizia una riunione pianificata, la successiva verrà automaticamente aperta per te. Puoi anche aprire manualmente le riunioni pianificate per importare il modello e iniziare a modificare l''ordine del giorno.

        '
      blankslate:
        title: Non ci sono più riunioni programmate
        desc: 'Non sono previsti altre riunioni in questa serie. Per pianificare altre riunioni o estendere la serie, vai al modello e modifica i dettagli del meeting per cambiare la data di fine, la frequenza o l''intervallo.

          '
