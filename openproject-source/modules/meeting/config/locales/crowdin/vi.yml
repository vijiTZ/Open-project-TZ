  text_meeting_draft_description: Chuẩn bị chương trình nghị sự của bạn ở chế độ dự thảo. Cuộc họp này sẽ không gửi bất kỳ cập nhật lịch hoặc lời mời nào, ngay cả khi bạn thay đổi chi tiết cuộc họp hoặc thêm/xóa người tham gia.
  text_meeting_open_description: Bạn có thể thêm/xóa các mục chương trình nghị sự và người tham gia. Khi chương trình nghị sự đã sẵn sàng, hãy đánh dấu nó là đang tiến hành để ghi lại kết quả.
  text_meeting_closed_description: Cuộc họp này đã kết thúc. Bạn không thể thêm/xóa các mục trong chương trình nghị sự nữa.
  text_meeting_in_progress_description: Bạn có thể sửa đổi chương trình nghị sự, ghi lại kết quả cho từng mục và theo dõi sự tham dự của người tham gia. Sau khi cuộc họp kết thúc, bạn có thể đánh dấu cuộc họp là đã đóng để khóa cuộc họp.
  text_meeting_open_dropdown_description: Mọi kết quả hiện có sẽ vẫn giữ nguyên nhưng người dùng sẽ không thể thêm kết quả mới.
  text_meeting_in_progress_dropdown_description: Ghi lại các kết quả như nhu cầu thông tin hoặc các quyết định được đưa ra trong cuộc họp.
  text_meeting_closed_dropdown_description: Cuộc họp này đã kết thúc. Bạn không thể sửa đổi các mục hoặc kết quả của chương trình nghị sự nữa.
  text_meeting_draft_banner: Bạn hiện đang ở chế độ nháp. Cuộc họp này sẽ không gửi bất kỳ cập nhật lịch hoặc lời mời nào, ngay cả khi bạn thay đổi chi tiết cuộc họp hoặc thêm/xóa người tham gia.
