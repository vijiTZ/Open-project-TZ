  label_gitlab_integration: GitLab Integration
  label_gitlab_actor: GitLab actor
  label_gitlab_webhook_secret: Webhook secret
  text_gitlab_actor_info: 'The OpenProject user whose API key must be used to authenticate incoming webhook requests. When set, requests authenticated with any other user''s credentials are rejected. This user also posts automated comments on work packages. Defaults to the system user when not set.

    '
  text_gitlab_webhook_secret_info: 'A secret token shared with GitLab when configuring the webhook. When set, OpenProject verifies the X-Gitlab-Token header on every incoming request, rejecting payloads that do not match. Leave blank to skip verification (not recommended).

    '
  text_gitlab_webhook_secret_missing_warning: 'No webhook secret is configured. Any request to the GitLab webhook endpoint will be accepted without verification, which may allow unauthorized actors to forge events. It is strongly recommended to set a secret.

    '
  project_module_gitlab: GitLab
  permission_show_gitlab_content: Tampilkan konten GitLab
  gitlab_integration:
    merge_request_opened_comment: "**MR Terbuka:** Permintaan penggabungan %{mr_number} [%{mr_title}](%{mr_url}) untuk [%{repository}](%{repository_url}) telah dibuka oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_closed_comment: "**MR Tertutup:** Permintaan penggabungan %{mr_number} [%{mr_title}](%{mr_url}) untuk [%{repository}](%{repository_url}) telah ditutup oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_merged_comment: "**MR Tergabung:** Permintaan penggabungan %{mr_number} [%{mr_title}](%{mr_url}) untuk [%{repository}](%{repository_url}) telah digabung oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_reopened_comment: "**MR Terbuka Kembali:** Permintaan penggabungan %{mr_number} [%{mr_title}](%{mr_url}) untuk [%{repository}](%{repository_url}) telah dibuka kembali oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    note_commit_referenced_comment: "**Dirujuk dalam Commit:** [%{gitlab_user}](%{gitlab_user_url}) merujuk WP ini di dalam Commit Note [%{commit_id}](%{commit_url}) di [%{repository}](%{repository_url}): %{commit_note}\n"
    note_mr_referenced_comment: "**Dirujuk dalam MR:** [%{gitlab_user}](%{gitlab_user_url}) merujuk WP ini di dalam Permintaan Penggabungan %{mr_number} [%{mr_title}](%{mr_url}) di [%{repository}](%{repository_url}): %{mr_note}\n"
    note_mr_commented_comment: "**Dikomentari dalam MR:** [%{gitlab_user}](%{gitlab_user_url}) memberikan komentar pada WP di dalam Permintaan Penggabungan %{mr_number} [%{mr_title}](%{mr_url}) di [%{repository}](%{repository_url}): %{mr_note}\n"
    note_issue_referenced_comment: "**Dirujuk dalam Isu:** [%{gitlab_user}](%{gitlab_user_url}) merujuk pada WP ini dalam Isu %{issue_number} [%{issue_title}](%{issue_url}) di [%{repository}](%{repository_url}): %{issue_note}\n"
    note_issue_commented_comment: "*Dikomentar dalam Isu:** [%{gitlab_user}](%{gitlab_user_url}) memberikan komentar terhadap WP ini dalam Isu %{issue_number} [%{issue_title}](%{issue_url}) di [%{repository}](%{repository_url}): %{issue_note}\n"
    note_snippet_referenced_comment: "**Dirujuk dalam Cuplikan:** [%{gitlab_user}](%{gitlab_user_url}) merujuk pada WP ini dalam Cuplikan %{snippet_number} [%{snippet_title}](%{snippet_url}) di [%{repository}](%{repository_url}): %{snippet_note}\n"
    issue_opened_referenced_comment: "**Isu Terbuka:** Isu %{issue_number} [%{issue_title}](%{issue_url}) untuk [%{repository}](%{repository_url}) telah dibuka oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_closed_referenced_comment: "**Isu Ditutup:** Isu %{issue_number} [%{issue_title}](%{issue_url}) untuk [%{repository}](%{repository_url}) telah ditutup oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_reopened_referenced_comment: "**Isu Dibuka Kembali:** Isu %{issue_number} [%{issue_title}](%{issue_url}) untuk [%{repository}](%{repository_url}) telah dibuka kembali oleh [%{gitlab_user}](%{gitlab_user_url}).\n"
    push_single_commit_comment: "**Didorong di MR:** [%{gitlab_user}](%{gitlab_user_url}) mendorong [%{commit_number}](%{commit_url}) ke [%{repository}](%{repository_url}) pada %{commit_timestamp}: %{commit_note}\n"
    push_single_commit_comment_with_ref: "**Didorong di %{reference}:** [%{gitlab_user}](%{gitlab_user_url}) mendorong [%{commit_number}](%{commit_url}) ke [%{repository}](%{repository_url}) pada %{commit_timestamp}: %{commit_note}\n"
    push_multiple_commits_comment: "**Didorong di MR:** [%{gitlab_user}](%{gitlab_user_url}) mendorong beberapa komit [%{commit_number}](%{commit_url}) ke [%{repository}](%{repository_url}) pada %{commit_timestamp}: %{commit_note}\n"
