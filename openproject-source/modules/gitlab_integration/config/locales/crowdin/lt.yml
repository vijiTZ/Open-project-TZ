  label_gitlab_integration: GitLab Integration
  label_gitlab_actor: GitLab actor
  label_gitlab_webhook_secret: Webhook secret
  text_gitlab_actor_info: 'The OpenProject user whose API key must be used to authenticate incoming webhook requests. When set, requests authenticated with any other user''s credentials are rejected. This user also posts automated comments on work packages. Defaults to the system user when not set.

    '
  text_gitlab_webhook_secret_info: 'A secret token shared with GitLab when configuring the webhook. When set, OpenProject verifies the X-Gitlab-Token header on every incoming request, rejecting payloads that do not match. Leave blank to skip verification (not recommended).

    '
  text_gitlab_webhook_secret_missing_warning: 'No webhook secret is configured. Any request to the GitLab webhook endpoint will be accepted without verification, which may allow unauthorized actors to forge events. It is strongly recommended to set a secret.

    '
  project_module_gitlab: GitLab
  permission_show_gitlab_content: Rodyti GitLab turinį
  gitlab_integration:
    merge_request_opened_comment: "**MR Atidarytas:** Suliejimo prašymą %{mr_number} [%{mr_title}](%{mr_url}) skirtą [%{repository}](%{repository_url}) atidarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_closed_comment: "**MR Uždarytas:** Suliejimo prašymą %{mr_number} [%{mr_title}](%{mr_url}) skirtą [%{repository}](%{repository_url}) uždarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_merged_comment: "**MR Sulietas:** Suliejimo prašymą %{mr_number} [%{mr_title}](%{mr_url}) skirtą [%{repository}](%{repository_url}) suliejo [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_reopened_comment: "**MR Atidarytas iš naujo:** Suliejimo prašymą %{mr_number} [%{mr_title}](%{mr_url}) skirtą [%{repository}](%{repository_url}) iš naujo atidarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    note_commit_referenced_comment: "**Paimnėtas pakeitime:** [%{gitlab_user}](%{gitlab_user_url}) paminėjo šį WP pakeitimo pastaboje [%{commit_id}](%{commit_url}) [%{repository}](%{repository_url}): %{commit_note}\n"
    note_mr_referenced_comment: "**Paminėta MR:** [%{gitlab_user}](%{gitlab_user_url}) paminėjo šį WP suliejimo prašyme %{mr_number} [%{mr_title}](%{mr_url}) [%{repository}](%{repository_url}): %{mr_note}\n"
    note_mr_commented_comment: "**Komentuota MR:** [%{gitlab_user}](%{gitlab_user_url}) komentavo šį WP suliejimo prašyme %{mr_number} [%{mr_title}](%{mr_url}) [%{repository}](%{repository_url}): %{mr_note}\n"
    note_issue_referenced_comment: "**Paminėjo problemoje:** [%{gitlab_user}](%{gitlab_user_url}) paminėjo šį WP problemoje %{issue_number} [%{issue_title}](%{issue_url}) [%{repository}](%{repository_url}): %{issue_note}\n"
    note_issue_commented_comment: "**Komentavo problemoje:** [%{gitlab_user}](%{gitlab_user_url}) komentavo šį WP problemoje %{issue_number} [%{issue_title}](%{issue_url}) [%{repository}](%{repository_url}): %{issue_note}\n"
    note_snippet_referenced_comment: "**Paminėjo gabaliuke:** [%{gitlab_user}](%{gitlab_user_url}) paminėjo šį WP gabaliuke %{snippet_number} [%{snippet_title}](%{snippet_url}) [%{repository}](%{repository_url}): %{snippet_note}\n"
    issue_opened_referenced_comment: "**Atverta problema:** Problemą %{issue_number} [%{issue_title}](%{issue_url}) skirtą [%{repository}](%{repository_url}) atidarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_closed_referenced_comment: "**Problema uždaryta:** Problemą %{issue_number} [%{issue_title}](%{issue_url}) skirtą [%{repository}](%{repository_url}) uždarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_reopened_referenced_comment: "**Problema vėl atidaryta:** Problemą %{issue_number} [%{issue_title}](%{issue_url}) skirtą [%{repository}](%{repository_url}) vėl atidarė [%{gitlab_user}](%{gitlab_user_url}).\n"
    push_single_commit_comment: "**Pakeista MR'e:** [%{gitlab_user}](%{gitlab_user_url}) pakeitė [%{commit_number}](%{commit_url}) į [%{repository}](%{repository_url}) %{commit_timestamp}: %{commit_note}\n"
    push_single_commit_comment_with_ref: "**Pushed in %{reference}:** [%{gitlab_user}](%{gitlab_user_url}) pushed [%{commit_number}](%{commit_url}) to [%{repository}](%{repository_url}) at %{commit_timestamp}: %{commit_note}\n"
    push_multiple_commits_comment: "**Pakeitė MR'e:** [%{gitlab_user}](%{gitlab_user_url}) padarė kelis pakeitimus [%{commit_number}](%{commit_url}) skirtus [%{repository}](%{repository_url}) %{commit_timestamp}: %{commit_note}\n"
