  label_gitlab_integration: GitLab Integration
  label_gitlab_actor: GitLab Benutzer
  label_gitlab_webhook_secret: Webhook Secret
  text_gitlab_actor_info: 'Der OpenProject-Benutzer, dessen API-Schlüssel für die Authentifizierung eingehender Webhook-Anfragen verwendet wird. Wenn er festgelegt ist, werden Anfragen, die mit den Anmeldedaten eines anderen Benutzers authentifiziert wurden, abgelehnt. Dieser Benutzer gibt auch automatische Kommentare zum Bereitstellungsstatus von Arbeitspaketen ab. Standardmäßig wird der Systembenutzer verwendet, wenn er nicht festgelegt ist.

    '
  text_gitlab_webhook_secret_info: 'Ein geheimes Token, das bei der Konfiguration des Webhooks mit GitLab geteilt wird. Wenn diese Option gesetzt ist, überprüft OpenProject den X-Gitlab-Token Header bei jeder eingehenden Anfrage und lehnt Payloads ab, die nicht übereinstimmen. Lassen Sie die Option leer, um die Überprüfung zu überspringen (nicht empfohlen).

    '
  text_gitlab_webhook_secret_missing_warning: 'Es ist kein Webhook Secret konfiguriert. Jede Anfrage an den GitLab-Endpunkt wird ohne Überprüfung akzeptiert, was es Unbefugten ermöglichen könnte, Ereignisse zu fälschen. Es wird dringend empfohlen, ein Secret festzulegen.

    '
  project_module_gitlab: GitLab
  permission_show_gitlab_content: GitLab-Inhalt anzeigen
  gitlab_integration:
    merge_request_opened_comment: "**MR eröffnet:** Der Merge Request %{mr_number} [%{mr_title}](%{mr_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) eröffnet.\n"
    merge_request_closed_comment: "**MR geschlossen:** Der Merge Request %{mr_number} [%{mr_title}](%{mr_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) geschlossen.\n"
    merge_request_merged_comment: "**MR Zusammengeführt:** Der Merge Request %{mr_number} [%{mr_title}](%{mr_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) zusammengeführt.\n"
    merge_request_reopened_comment: "**MR Wiedereröffnet:** Der Merge Request %{mr_number} [%{mr_title}](%{mr_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) wiedereröffnet.\n"
    note_commit_referenced_comment: "**Referenziert in Commit:** [%{gitlab_user}](%{gitlab_user_url}) verwies auf dieses WP in einer Commit Note [%{commit_id}](%{commit_url}) auf [%{repository}](%{repository_url}): %{commit_note}\n"
    note_mr_referenced_comment: "**Referenziert in MR:** [%{gitlab_user}](%{gitlab_user_url}) verwies auf dieses WP in Merge Request %{mr_number} [%{mr_title}](%{mr_url}) auf [%{repository}](%{repository_url}): %{mr_note}\n"
    note_mr_commented_comment: "**Kommentiert in MR:** [%{gitlab_user}](%{gitlab_user_url}) kommentierte dieses WP in Merge Request %{mr_number} [%{mr_title}](%{mr_url}) auf [%{repository}](%{repository_url}): %{mr_note}\n"
    note_issue_referenced_comment: "**Referenziert in Ticket:** [%{gitlab_user}](%{gitlab_user_url}) verwies auf dieses WP in %{issue_number} [%{issue_title}](%{issue_url}) auf [%{repository}](%{repository_url}): %{issue_note}\n"
    note_issue_commented_comment: "**Kommentiert in Ticket:** [%{gitlab_user}](%{gitlab_user_url}) kommentierte dieses WP in Ticket %{issue_number} [%{issue_title}](%{issue_url}) auf [%{repository}](%{repository_url}): %{issue_note}\n"
    note_snippet_referenced_comment: "**Referenziert in Snippet:** [%{gitlab_user}](%{gitlab_user_url}) verweist auf dieses WP in Snippet %{snippet_number} [%{snippet_title}](%{snippet_url}) auf [%{repository}](%{repository_url}): %{snippet_note}\n"
    issue_opened_referenced_comment: "**Ticket erstellt:** %{issue_number} [%{issue_title}](%{issue_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) erstellt.\n"
    issue_closed_referenced_comment: "**Ticket geschlossen:** %{issue_number} [%{issue_title}](%{issue_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) geschlossen.\n"
    issue_reopened_referenced_comment: "**Wiedereröffnetes Ticket:** %{issue_number} [%{issue_title}](%{issue_url}) für [%{repository}](%{repository_url}) wurde von [%{gitlab_user}](%{gitlab_user_url}) wiedereröffnet.\n"
    push_single_commit_comment: "**In MR gepusht:** [%{gitlab_user}](%{gitlab_user_url}) hat [%{commit_number}](%{commit_url}) auf [%{repository}](%{repository_url}) in %{commit_timestamp}gedrückt: %{commit_note}\n"
    push_single_commit_comment_with_ref: "**In %{reference} gepusht: ** [%{gitlab_user}](%{gitlab_user_url}) hat [%{commit_number}](%{commit_url}) auf [%{repository}](%{repository_url}) in %{commit_timestamp}:  %{commit_note}\n"
    push_multiple_commits_comment: "**Im MR gepusht:** [%{gitlab_user}](%{gitlab_user_url}) hat mehrere Commits [%{commit_number}](%{commit_url}) bis [%{repository}](%{repository_url}) unter %{commit_timestamp}gepusht : %{commit_note}\n"
