  permission_show_gitlab_content: 顯示 GitLab內容
  gitlab_integration:
    merge_request_opened_comment: "**MR 已開啟：** [%{repository}](%{repository_url}) 的合併請求 %{mr_number} [%{mr_title}](%{mr_url}) 已由 [%{gitlab_user}](%{gitlab_user_url}).。\n"
    merge_request_closed_comment: "**MR 已關閉：** [%{repository}](%{repository_url}) 的合併請求 %{mr_number} [%{mr_title}](%{mr_url}) 已被 [%{gitlab_user}](%{gitlab_user_url}) 關閉。\n"
    merge_request_merged_comment: "**MR 已合併：** [%{repository}](%{repository_url}) 的合併請求 %{mr_number} [%{mr_title}](%{mr_url}) 已被 [%{gitlab_user}](%{gitlab_user_url}) 合併。\n"
    merge_request_reopened_comment: "**MR 已重新開啟：** [%{repository}](%{repository_url}) 的合併請求 %{mr_number} [%{mr_title}](%{mr_url}) 已被 [%{gitlab_user}](%{gitlab_user_url}) 重新開啟。\n"
    note_commit_referenced_comment: "**在commit中引用：** [%{gitlab_user}](%{gitlab_user_url}) 引用了此WP於Commit Note [%{repository}](%{repository_url}) 在 [%{commit_id}](%{commit_url}) 上: %{commit_note}\n"
    note_mr_referenced_comment: "**在MR 引用：** [%{gitlab_user}](%{gitlab_user_url}) 在合併請求%{mr_number} [%{mr_title}](%{mr_url}) 中引用了此WP在 [%{repository}](%{repository_url}) 上: %{mr_note}\n"
    note_mr_commented_comment: "** 在 MR 中評論：** [%{gitlab_user}](%{gitlab_user_url}) 在合併請求 %{mr_number} [%{mr_title}](%{mr_url}) 對 [%{repository}](%{repository_url}) 評論了此 WP： %{mr_note}\n"
    note_issue_referenced_comment: "** 在 Issue 中引用：** [%{gitlab_user}](%{gitlab_user_url}) 引用了此 WP，於 Issue %{issue_number} [%{issue_title}](%{issue_url}) 在 [%{repository}](%{repository_url}) 上： %{issue_note}\n"
    note_issue_commented_comment: "** 在 Issue 中註解：** [%{gitlab_user}](%{gitlab_user_url}) 註解此 WP於 Issue %{issue_number} [%{issue_title}](%{issue_url}) 在 [%{repository}](%{repository_url}) 上 ： %{issue_note}\n"
    note_snippet_referenced_comment: "** 在 Snippet 中被引用：** [%{gitlab_user}](%{gitlab_user_url}) 引用了此 WP於 Snippet %{snippet_number} [%{snippet_title}](%{snippet_url}) 在 [%{repository}](%{repository_url}) 上： %{snippet_note}\n"
    issue_opened_referenced_comment: "** 問題已開啟：** 問題 %{issue_number} [%{issue_title}](%{issue_url}) for [%{repository}](%{repository_url}) 已由 [%{gitlab_user}](%{gitlab_user_url}) 開啟。\n"
    issue_closed_referenced_comment: "** 問題關閉：** 問題 %{issue_number} [%{issue_title}](%{issue_url}) 為 [%{repository}](%{repository_url}) 已被 [%{gitlab_user}](%{gitlab_user_url}) 關閉。\n"
    issue_reopened_referenced_comment: "** 問題重新開啟：** 問題 %{issue_number} [%{issue_title}](%{issue_url}) 為 [%{repository}](%{repository_url}) 已由 [%{gitlab_user}](%{gitlab_user_url}) 重新開啟。\n"
    push_single_commit_comment: "** 在 MR 中推送：** [%{gitlab_user}](%{gitlab_user_url}) 推送 [%{commit_number}](%{commit_url}) 到 [%{repository}](%{repository_url}) 在 %{commit_timestamp}: %{commit_note}\n"
    push_single_commit_comment_with_ref: "** 推送在 %{reference}:** [%{gitlab_user}](%{gitlab_user_url}) 推送 [%{commit_number}](%{commit_url}) 到 [%{repository}](%{repository_url}) 在 %{commit_timestamp}: %{commit_note}\n"
    push_multiple_commits_comment: "** 在 MR 中推送：** [%{gitlab_user}](%{gitlab_user_url}) 推送了多個提交 [%{commit_number}](%{commit_url}) 到 [%{repository}](%{repository_url}) 在 %{commit_timestamp}: %{commit_note}\n"
