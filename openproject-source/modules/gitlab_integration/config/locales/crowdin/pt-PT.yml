  label_gitlab_integration: Integração no GitLab
  label_gitlab_actor: Ator do GitLab
  label_gitlab_webhook_secret: Segredo do webhook
  text_gitlab_actor_info: 'O utilizador do OpenProject cuja chave API deve ser utilizada para autenticar os pedidos de webhook recebidos. Quando definido, os pedidos autenticados com as credenciais de qualquer outro utilizador são rejeitados. Este utilizador também publica comentários automáticos nos pacotes de trabalho. Quando não definido, a predefinição é o utilizador do sistema.

    '
  text_gitlab_webhook_secret_info: 'Um token secreto partilhado com o GitLab ao configurar o webhook. Quando definido, o OpenProject verifica o cabeçalho X-Gitlab-Token em todas as solicitações recebidas, rejeitando cargas que não correspondam. Deixe em branco para ignorar a verificação (não recomendado).

    '
  text_gitlab_webhook_secret_missing_warning: 'Não está configurado nenhum segredo de webhook. Qualquer solicitação para o ponto de extremidade do webhook do GitLab será aceite sem verificação, o que pode permitir que atores não autorizados simulem eventos. É altamente recomendável definir um segredo.

    '
  project_module_gitlab: GitLab
  permission_show_gitlab_content: Mostrar conteúdo GitLab
  gitlab_integration:
    merge_request_opened_comment: "**MR aberto:** Pedido de fusão %{mr_number} [%{mr_title}](%{mr_url}) para [%{repository}](%{repository_url}) foi aberto por [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_closed_comment: "**MR fechado:** Pedido de fusão %{mr_number} [%{mr_title}](%{mr_url}) para [%{repository}](%{repository_url}) foi fechado por [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_merged_comment: "**MR fundido:** Pedido de fusão %{mr_number} [%{mr_title}](%{mr_url}) para [%{repository}](%{repository_url}) foi fundido por [%{gitlab_user}](%{gitlab_user_url}).\n"
    merge_request_reopened_comment: "**MR reaberto:** Pedido de fusão %{mr_number} [%{mr_title}](%{mr_url}) para [%{repository}](%{repository_url}) foi reaberto por [%{gitlab_user}](%{gitlab_user_url}).\n"
    note_commit_referenced_comment: "**Referenciado em Confirmação:** [%{gitlab_user}](%{gitlab_user_url}) referenciou este WP numa Nota de Confirmação [%{commit_id}](%{commit_url}) em [%{repository}](%{repository_url}): %{commit_note}\n"
    note_mr_referenced_comment: "**Referenciado em MR:** [%{gitlab_user}](%{gitlab_user_url}) referenciou este WP no Pedido de Fusão %{mr_number} [%{mr_title}](%{mr_url}) em [%{repository}](%{repository_url}): %{mr_note}\n"
    note_mr_commented_comment: "**Comentado em RM:** [%{gitlab_user}](%{gitlab_user_url}) comentou este WP no Pedido de Fusão %{mr_number} [%{mr_title}](%{mr_url}) em [%{repository}](%{repository_url}): %{mr_note}\n"
    note_issue_referenced_comment: "**Referenciado no Problema:** [%{gitlab_user}](%{gitlab_user_url}) referenciou este WP no Problema %{issue_number} [%{issue_title}](%{issue_url}) em [%{repository}](%{repository_url}): %{issue_note}\n"
    note_issue_commented_comment: "**Comentado no Problema:** [%{gitlab_user}](%{gitlab_user_url}) comentou este WP no Problema %{issue_number} [%{issue_title}](%{issue_url}) em [%{repository}](%{repository_url}): %{issue_note}\n"
    note_snippet_referenced_comment: "**Referenciado no Snippet:** [%{gitlab_user}](%{gitlab_user_url}) referenciou este WP no Snippet %{snippet_number} [%{snippet_title}](%{snippet_url}) em [%{repository}](%{repository_url}): %{snippet_note}\n"
    issue_opened_referenced_comment: "**Problema Aberto:** Problema %{issue_number} [%{issue_title}](%{issue_url}) para [%{repository}](%{repository_url}) foi aberto por [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_closed_referenced_comment: "**Problema Fechado:** Problema %{issue_number} [%{issue_title}](%{issue_url}) para [%{repository}](%{repository_url}) foi fechado por [%{gitlab_user}](%{gitlab_user_url}).\n"
    issue_reopened_referenced_comment: "**Problema Reaberto:** Problema %{issue_number} [%{issue_title}](%{issue_url}) para [%{repository}](%{repository_url}) foi reaberto por [%{gitlab_user}](%{gitlab_user_url}).\n"
    push_single_commit_comment: "**Enviado no MR:** [%{gitlab_user}](%{gitlab_user_url}) enviou [%{commit_number}](%{commit_url}) para [%{repository}](%{repository_url}) em %{commit_timestamp}: %{commit_note}\n"
    push_single_commit_comment_with_ref: "**Enviado em %{reference}:** [%{gitlab_user}](%{gitlab_user_url}) enviou [%{commit_number}](%{commit_url}) para [%{repository}](%{repository_url}) em %{commit_timestamp}: %{commit_note}\n"
    push_multiple_commits_comment: "**Enviado no MR:** [%{gitlab_user}](%{gitlab_user_url}) enviou vários compromissos [%{commit_number}](%{commit_url}) para [%{repository}](%{repository_url}) em %{commit_timestamp}: %{commit_note}\n"
