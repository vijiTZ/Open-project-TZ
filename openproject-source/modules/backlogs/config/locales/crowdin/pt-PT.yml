                other: Existem %{count} pacotes de trabalho que não foram concluídos neste sprint.
              format: "%{message}"
            status:
              not_active: não está ativo, portanto não pode ser concluído.
        work_package:
          backlog_bucket_xor_sprint: não pode ser atribuído simultaneamente a um sprint e a um grupo de backlog.
          attributes:
            backlog_bucket:
              backlog_bucket_from_another_project: deve pertencer ao mesmo projeto que o pacote de trabalho.
            blocks_ids:
              can_only_contain_work_packages_of_current_sprint: pode conter somente os IDs dos pacotes de trabalho no sprint atual.
              must_block_at_least_one_work_package: deve conter a identificação de pelo menos um bilhete.
            version_id:
              task_version_must_be_the_same_as_story_version: tem ser o mesmo que a versão da história do pai.
            sprint:
              not_assignable: não é atribuível, uma vez que ou não é partilhado com o projeto ou já está terminado.
              not_eligible_for_moving: não é um sprint ativo no projeto em que está a decorrer o sprint do qual o pacote de trabalho está a ser transferido.
