            disabled_caption_anonymous: Option non disponible car un autre projet est actuellement en train de partager avec tous les projets et seul un projet peut le faire.
          share_subprojects:
            label: Sous-projets
            caption: Les sprints créés dans ce projet seront disponibles pour tous les sous-projets du projet en cours.
            info: Le partage d'un sprint entraîne le partage du nom, du statut et des dates de début et de fin dans tous les projets. Ceux-ci ne peuvent pas être modifiés dans les projets qui reçoivent et utilisent ces sprints.
