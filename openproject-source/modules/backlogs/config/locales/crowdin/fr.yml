          receive_shared:
            label: Recevoir des sprints partagés
            caption: Ce projet ne peut utiliser que des sprints partagés par d'autres projets.
            warning: Ce projet ne peut utiliser que des sprints partagés par d'autres projets. Les sprints inutilisés créés dans ce projet par le passé ne seront plus visibles.
          share_all_projects:
            label: Tous les projets
            caption: Les sprints créés dans ce projet seront disponibles pour tous les projets de cette instance. Si vous sélectionnez cette option, les sprints ne seront plus disponibles pour les autres projets.
