---
tr:
  plugin_openproject_backlogs:
    name: OpenProject Backlog
    description: Bu modül, çevik ekiplerin Scrum projelerinde OpenProject ile çalışmasını sağlayan özellikler ekler.
  activerecord:
    attributes:
      project:
        sprint_sharing: Sprint sharing
      sprint:
        duration: Duration
        finish_date: Finish date
        goal: Sprint goal
        name: Sprint name
        sharing: Sharing
        statuses:
          in_planning: In planning
          active: Active
          completed: Completed
      user_preference:
        backlogs_versions_default_fold_state: Show sprints folded
      work_package:
        backlog_bucket: Backlog Bucket
        backlogs_work_package_type: Bekleme listesi türü
        position: Konum
        sprint: Sprint
        story_points: Hikaye Puanları
    errors:
      messages:
        must_be_in_planning: must be in planning to start.
        only_one_active_sprint_allowed: proje başına yalnızca bir aktif sprint'e izin verilir.
        dates_required: Start and finish dates are required in order to start the sprint.
      models:
        project:
          receiving_sprints: is receiving shared sprints. Own sprints cannot be created.
          attributes:
            sprint_sharing:
              share_all_projects_already_taken: cannot be set because project "%{name}" is already sharing with all projects.
              share_all_projects_already_taken_anonymous: cannot be set because another project is already sharing with all projects.
        sprint:
          attributes:
            base:
              unfinished_work_packages:
                one: There is one work package that was not completed in this sprint.
                other: There are %{count} work packages that were not completed in this sprint.
              format: "%{message}"
            status:
              not_active: is not active so it cannot be closed.
        work_package:
          backlog_bucket_xor_sprint: cannot be assigned to both a sprint and a backlog bucket.
          attributes:
            backlog_bucket:
              backlog_bucket_from_another_project: must belong to the same project as the work package.
            blocks_ids:
              can_only_contain_work_packages_of_current_sprint: yalnızca geçerli sprintteki iş paketlerinin kimliklerini içerebilir.
              must_block_at_least_one_work_package: en az bir biletin kimliğini içermelidir.
            version_id:
              task_version_must_be_the_same_as_story_version: ana hikaye sürümüyle aynı olmalıdır.
            sprint:
              not_assignable: is not assignable since it is either not shared with the project or already finished.
              not_eligible_for_moving: is not an active sprint in the project which holds the sprint the work package is moved out of.
    models:
      sprint: Sprint
  backlogs:
    caption_sprints_default_fold_state: Sprints will not be expanded by default when viewing the 'Backlog and sprints' page. Each one has to be manually expanded.
    definition_of_done: Bitti Tanımı
    definition_of_done_caption: Work packages with these statuses are treated as completed in backlog views and reporting.
    done_status: Done status
    sharing_description: This project can either share its own sprints, receive shared sprints or handle sprints independently (no sharing).
    sharing: Paylaşım
    label_burndown_chart: Burndown grafiği
    label_sprint_board: Sprint board
    work_package_is_closed: İş paketi, ne zaman
    label_is_done_status: Durum %{status_name} tamamlandı anlamına geliyor
    points_label:
      one: nokta
      other: noktalar
    positions_could_not_be_rebuilt: Pozisyonlar yeniden oluşturulamadı.
    positions_rebuilt_successfully: Pozisyonlar başarıyla yeniden oluşturuldu.
    rebuild: Yeniden inşa et
    rebuild_positions: Pozisyonu yeniden inşa et
    remaining_hours: Kalan çalışma
    show_burndown_chart: Burndown grafiği
    story_points:
      one: "%{count} hikaye noktası"
      other: "%{count} hikaye noktaları"
    unassigned: Atanmamış
    user_preference:
      header_backlogs: Birikmiş İşler Modülü
      button_update_backlogs: Birikmiş işler modülünü güncelle
