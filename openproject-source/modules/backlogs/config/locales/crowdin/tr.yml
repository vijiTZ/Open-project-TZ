  permission_share_sprint: Sprint paylaşma
  permission_start_complete_sprint: Sprint'i başlatma/tamamlama
  permission_view_sprints: Sprintleri görüntüleme
  project_module_backlogs: İş listesi
  projects:
    settings:
      backlog_sharing:
        options:
          no_sharing:
            label: Paylaşma
            caption: Bu projede oluşturulan sprintler yalnızca bu proje tarafından kullanılabilir ve görülebilir olacaktır. Ayrıca alt projeler tarafından da görülemezler.
          receive_shared:
            label: Paylaşılan sprintleri alın
            caption: Bu proje yalnızca diğer projeler tarafından paylaşılan sprintleri kullanabilir.
            warning: Bu proje yalnızca diğer projeler tarafından paylaşılan sprintleri kullanabilir. Geçmişte bu projede oluşturulan kullanılmayan sprintler artık görünmeyecektir.
          share_all_projects:
            label: Tüm projeler
            caption: Bu projede oluşturulan sprintler bu örnekteki tüm projeler tarafından kullanılabilir. Bu seçeneği seçerseniz, artık diğer projeler tarafından kullanılamayacaktır.
            disabled_caption: '"%{name}" projesi şu anda tüm projelerle paylaşıldığından ve bunu yalnızca bir proje yapabildiğinden seçenek kullanılamaz.'
            disabled_caption_anonymous: Başka bir proje şu anda tüm projelerle paylaşımda olduğundan ve bunu yalnızca bir proje yapabildiğinden seçenek kullanılamaz.
          share_subprojects:
            label: Alt Projeler
            caption: Bu projede oluşturulan sprintler, mevcut projenin tüm alt projelerinde kullanılabilir olacaktır.
            info: Bir sprintin paylaşılması, tüm projelerde adı, durumu ve başlangıç ve bitiş tarihlerini paylaşacaktır. Bu sprintleri alan ve kullanan projelerde bunlar değiştirilemez.
        sprint_sharing: Sprintleri paylaş
  remaining_hours: kalan çalışma
