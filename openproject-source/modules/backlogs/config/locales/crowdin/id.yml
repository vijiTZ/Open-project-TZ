    description: Modul ini menambahkan fitur yang memungkinkan tim yang gesit bekerja dengan OpenProject dalam proyek Scrum.
  activerecord:
    attributes:
      project:
        sprint_sharing: Sprint sharing
      sprint:
        duration: Duration
        finish_date: Finish date
        goal: Sprint goal
        name: Sprint name
        sharing: Sharing
        statuses:
          in_planning: In planning
          active: Active
          completed: Completed
      user_preference:
        backlogs_versions_default_fold_state: Show sprints folded
