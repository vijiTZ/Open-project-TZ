  text_github_comment_user_info: 'El usuario de OpenProject cuya clave API debe utilizarse para autenticar las solicitudes de webhook entrantes. Cuando se configura, se rechazan las solicitudes autenticadas con las credenciales de cualquier otro usuario. Este usuario también publica comentarios automáticos sobre el estado de las implementaciones en los paquetes de trabajo. Si no se configura, el valor predeterminado es el usuario del sistema.

    '
  text_github_webhook_secret_missing_warning: 'No hay ningún secreto de webhook configurado. Cualquier solicitud al punto final del webhook de GitHub se aceptará sin verificación, lo que podría permitir que personas no autorizadas falsifiquen eventos. Se recomienda encarecidamente establecer un secreto.

    '
  text_github_webhook_secret_info: 'Un token secreto que se comparte con GitHub al configurar el webhook. Cuando se activa, OpenProject verifica el encabezado «X-Hub-Signature-256» en cada solicitud entrante y rechaza las cargas útiles que no coincidan. Déjalo en blanco para omitir la verificación (no recomendado).

    '
