  label_github_webhook_secret: Webhook secret
  text_github_comment_user_info: 'O usuário do OpenProject cuja chave API deve ser usada para autenticar solicitações de webhook recebidas. Quando definido, as solicitações autenticadas com as credenciais de qualquer outro usuário são rejeitadas. Esse usuário também publica comentários automáticos sobre o status da implantação nos pacotes de trabalho. O padrão é o usuário do sistema quando não estiver definido.

    '
  text_github_webhook_secret_missing_warning: 'Não há nenhum segredo de webhook configurado. Qualquer solicitação enviada ao ponto de extremidade do webhook do GitHub será aceita sem verificação, o que pode permitir que pessoas não autorizadas falsifiquem eventos. É altamente recomendável definir um segredo.

    '
  text_github_webhook_secret_info: 'Um token secreto compartilhado com o GitHub ao configurar o webhook. Quando definido, o OpenProject verifica o cabeçalho X-Hub-Signature-256 em cada solicitação recebida, rejeitando cargas úteis que não correspondam. Deixe em branco para ignorar a verificação (não recomendado).

    '
  plugin_openproject_github_integration:
    name: Integração do OpenProject GitHub
    description: Integra o OpenProject e o GitHub para um melhor fluxo de trabalho
