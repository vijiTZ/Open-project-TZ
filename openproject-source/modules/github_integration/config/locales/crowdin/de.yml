  text_github_comment_user_info: 'Der OpenProject-Benutzer, dessen API-Schlüssel für die Authentifizierung eingehender Webhook-Anfragen verwendet wird. Wenn er festgelegt ist, werden Anfragen, die mit den Anmeldedaten eines anderen Benutzers authentifiziert wurden, abgelehnt. Dieser Benutzer gibt auch automatische Kommentare zum Bereitstellungsstatus von Arbeitspaketen ab. Standardmäßig wird der Systembenutzer verwendet, wenn er nicht festgelegt ist.

    '
  text_github_webhook_secret_missing_warning: 'Es ist kein Webhook Secret konfiguriert. Jede Anfrage an den GitHub-Endpunkt wird ohne Überprüfung akzeptiert, was es Unbefugten ermöglichen könnte, Ereignisse zu fälschen. Es wird dringend empfohlen, ein Geheimnis festzulegen.

    '
  text_github_webhook_secret_info: 'Ein geheimes Token, das bei der Konfiguration des Webhooks mit GitHub geteilt wird. Wenn diese Option gesetzt ist, überprüft OpenProject den X-Hub-Signature-256-Header bei jeder eingehenden Anfrage und lehnt Payloads ab, die nicht übereinstimmen. Lassen Sie die Option leer, um die Überprüfung zu überspringen (nicht empfohlen).

    '
  plugin_openproject_github_integration:
