#English strings go here for Rails i18n
---
id:
  plugin_openproject_recaptcha:
    name: OpenProject ReCaptcha
    description: Modul ini menyediakan verifikasi reCAPTCHA selama proses login.
  recaptcha:
    label_recaptcha: reCAPTCHA
    button_please_wait: Harap tunggu ...
    verify_account: Verifikasi akun anda
    error_captcha: Akun anda tidak dapat diverifikasi. Silakan hubungi administrator.
    settings:
      website_key: Kunci situs web (Bisa juga "Kunci situs")
      response_limit: Batas respon untuk HCaptcha
      response_limit_text: Jumlah maksimum karakter untuk memperlakukan respon HCaptcha sebagai valid.
      website_key_text: Masukkan kunci situs web yang Anda buat di konsol admin reCAPTCHA untuk domain ini.
      secret_key: Kunci rahasia
      secret_key_text: Masukkan kunci rahasia yang Anda buat di konsol admin reCAPTCHA.
      type: Gunakan reCAPTCHA
      type_disabled: Matikan reCAPTCHA
      type_v2: reCAPTCHA v2
      type_v3: reCAPTCHA v3
      type_hcaptcha: HCaptcha
      type_turnstile: Cloudflare Turnstile™
      captcha_description_html: 'reCAPTCHA adalah layanan gratis dari Google yang dapat diaktifkan untuk instance OpenProject Anda. Jika diaktifkan, formulir captcha akan ditampilkan saat login bagi semua pengguna yang belum memverifikasi captcha. <br/> Silakan lihat tautan berikut untuk detail lebih lanjut tentang reCAPTCHA dan versinya, serta cara membuat kunci situs web dan kunci rahasia: %{recaptcha_link} <br/> HCaptcha adalah alternatif bebas Google yang dapat Anda gunakan jika tidak ingin menggunakan reCAPTCHA. Lihat tautan ini untuk informasi lebih lanjut: %{hcaptcha_link} <br/> Cloudflare Turnstile™ adalah alternatif lain yang lebih nyaman bagi pengguna sambil tetap memberikan tingkat keamanan yang sama. Lihat tautan ini untuk informasi lebih lanjut: %{turnstile_link}

        '
