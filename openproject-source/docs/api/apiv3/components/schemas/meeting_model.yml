# Schema: MeetingModel
---
type: object
required:
  - _type
  - id
  - lockVersion
  - title
  - startTime
  - endTime
  - duration
  - createdAt
  - updatedAt
properties:
  _type:
    type: string
    enum:
      - Meeting
  id:
    type: integer
    description: Identifier of this meeting
    minimum: 1
  title:
    type: string
    description: The meeting's title
  location:
    type: string
    description: The meeting's location
  lockVersion:
    type: integer
    description: The version of the item as used for optimistic locking
  startTime:
    type: string
    format: date-time
    description: The scheduled meeting start time.
  endTime:
    type: string
    format: date-time
    description: The scheduled meeting end time.
  duration:
    type: string
    format: duration
    description: The meeting duration in hours.
  state:
    type: string
    description: |-
      The current state of the meeting. Possible values:

      - *open*: the meeting is open
      - *draft*: the meeting is in draft state
      - *in_progress*: the meeting is currently in progress
      - *cancelled*: the meeting has been cancelled
      - *closed*: the meeting is closed
    enum:
      - open
      - draft
      - in_progress
      - cancelled
      - closed
  sharing:
    type: string
    description: |-
      How the meeting template is shared. Only applicable for one-time templates. Possible values:

      - *none*: not shared
      - *descendants*: shared with descendant projects
      - *system*: shared globally
    enum:
      - none
      - descendants
      - system
  template:
    type: boolean
    description: Whether this meeting is a template.
  notify:
    type: boolean
    description: Whether to send email notifications to participants.
  createdAt:
    type: string
    format: date-time
    description: Time of creation. Can be writable by admins with the `apiv3_write_readonly_attributes` setting enabled.
  updatedAt:
    type: string
    format: date-time
    description: Time of the most recent change to the meeting.
  _embedded:
    type: object
    required:
      - attachments
      - author
    properties:
      attachments:
        $ref: './attachments_model.yml'
      author:
        $ref: './user_model.yml'
      project:
        $ref: './project_model.yml'
  _links:
    type: object
    properties:
      self:
        allOf:
          - $ref: './link.yml'
          - description: |-
              This meeting

              **Resource**: Meeting
      schema:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The meeting schema

              **Resource**: Schema
      update:
        allOf:
          - $ref: './link.yml'
          - description: |-
              Form endpoint to update this meeting

              # Conditions

              **Permission**: edit meetings
      updateImmediately:
        allOf:
          - $ref: './link.yml'
          - description: |-
              Directly update this meeting

              # Conditions

              **Permission**: edit meetings
      delete:
        allOf:
          - $ref: './link.yml'
          - description: |-
              Delete this meeting

              # Conditions

              **Permission**: delete meetings
      author:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The user having created the meeting

              **Resource**: User
      project:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The project the meeting is in

              **Resource**: Project
      attachments:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The attachment collection of this meeting.

              **Resource**: AttachmentCollection
      addAttachment:
        allOf:
          - $ref: './link.yml'
          - description: |-
              Attach a file to the meeting

              # Conditions

              **Permission**: edit meetings
