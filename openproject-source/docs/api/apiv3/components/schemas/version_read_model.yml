# Schema: VersionReadModel
---
allOf:
  - $ref: "./custom_field_properties.yml"
  - type: object
    required:
      - id
      - _type
      - name
      - description
      - startDate
      - endDate
      - status
      - sharing
      - createdAt
      - updatedAt
    properties:
      id:
        type: integer
        description: Version id
        minimum: 1
      _type:
        type: string
        enum:
          - Version
      name:
        type: string
        description: Version name
      description:
        $ref: "./formattable.yml"
      startDate:
        type:
          - "string"
          - "null"
        format: date
      endDate:
        type:
          - "string"
          - "null"
        format: date
      status:
        type: string
        description: |-
          The current status of the version. This could be:

          - *open*: if the version is available to be assigned to work packages in all shared projects
          - *locked*: if the version is not finished, but locked for further assignments to work packages
          - *closed*: if the version is finished
        enum:
          - open
          - locked
          - closed
      sharing:
        type: string
        description: |-
          The indicator of how the version is shared between projects. This could be:

          - *none*: if the version is only available in the defining project
          - *descendants*: if the version is shared with the descendants of the defining project
          - *hierarchy*: if the version is shared with the descendants and the ancestors of the defining project
          - *tree*: if the version is shared with the root project of the defining project and all descendants of the root project
          - *system*: if the version is shared globally
        enum:
          - none
          - descendants
          - hierarchy
          - tree
          - system
      createdAt:
        type: string
        format: date-time
        description: Time of creation
      updatedAt:
        type: string
        format: date-time
        description: Time of the most recent change to the version
      _links:
        allOf:
          - $ref: "./custom_field_linked_properties.yml"
          - type: object
            required:
              - self
              - schema
              - definingProject
              - availableInProjects
            properties:
              self:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      This version

                      **Resource**: Version
              schema:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      The schema of this version

                      **Resource**: VersionSchema
              update:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      Form endpoint that aids in preparing and performing edits on the version

                      # Conditions

                      **Permission**: manage versions
              delete:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      Deletes this version

                      # Conditions

                      **Permission**: manage versions
              updateImmediately:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      Directly perform edits on the version

                      # Conditions

                      **Permission**: manage versions
              definingProject:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      The workspace to which the version belongs

                      **Resource**: Workspace
              availableInProjects:
                allOf:
                  - $ref: "./link.yml"
                  - description: |-
                      Workspaces where this version can be used

                      **Resource**: Workspace
