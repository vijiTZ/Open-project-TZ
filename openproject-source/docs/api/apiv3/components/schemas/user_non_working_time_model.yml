# Schema: UserNonWorkingTimeModel
---
type: object
required:
  - _type
  - id
  - startDate
  - endDate
properties:
  _type:
    type: string
    enum:
      - UserNonWorkingTime
  id:
    type: integer
    description: |-
      The unique identifier of the non-working time record.
    minimum: 1
  startDate:
    type: string
    format: date
    description: |-
      The first date of the non-working time range in ISO 8601 format (YYYY-MM-DD).
  endDate:
    type: string
    format: date
    description: |-
      The last date of the non-working time range in ISO 8601 format (YYYY-MM-DD).
      Must be greater than or equal to `startDate`.
  _links:
    type: object
    required:
      - self
      - user
    properties:
      self:
        allOf:
          - $ref: './link.yml'
          - description: |-
              This non-working time record.
              **Resource**: UserNonWorkingTime
      user:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The user this non-working time belongs to.
              **Resource**: User

example:
  _type: UserNonWorkingTime
  id: 7
  startDate: '2025-06-16'
  endDate: '2025-06-20'
  _links:
