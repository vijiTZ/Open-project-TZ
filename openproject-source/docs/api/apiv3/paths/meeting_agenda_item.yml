# /api/v3/meetings/{meeting_id}/agenda_items/{id}
---
get:
  summary: Get a meeting agenda item
  operationId: get_meeting_agenda_item
  tags:
    - Meetings
  description: Retrieve an individual agenda item of a meeting.
  parameters:
    - description: Meeting identifier
      example: 1
      in: path
      name: meeting_id
      required: true
      schema:
        type: integer
    - description: Agenda item identifier
      example: 1
      in: path
      name: id
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: OK
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/meeting_agenda_item_model.yml"
    '404':
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/error_response.yml"
          examples:
            response:
              value:
                _type: Error
                errorIdentifier: urn:openproject-org:api:v3:errors:NotFound
                message: The requested resource could not be found.
      description: |-
        Returned if the agenda item or meeting does not exist or the client does not have sufficient permissions.

patch:
  summary: Update a meeting agenda item
  operationId: update_meeting_agenda_item
  tags:
    - Meetings
  description: Updates the given agenda item.
  parameters:
    - description: Meeting identifier
      example: 1
      in: path
      name: meeting_id
      required: true
      schema:
        type: integer
    - description: Agenda item identifier
      example: 1
      in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    content:
      application/json:
        schema:
          $ref: "../components/schemas/meeting_agenda_item_write_model.yml"
  responses:
    '200':
      description: OK
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/meeting_agenda_item_model.yml"
    '400':
      $ref: "../components/responses/invalid_request_body.yml"
    '403':
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/error_response.yml"
          examples:
            response:
              value:
                _type: Error
                errorIdentifier: urn:openproject-org:api:v3:errors:MissingPermission
                message: You are not authorized to access this resource.
      description: |-
        Returned if the client does not have sufficient permissions.

        **Required permission:** manage agendas
    '404':
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/error_response.yml"
          examples:
            response:
              value:
                _type: Error
                errorIdentifier: urn:openproject-org:api:v3:errors:NotFound
                message: The requested resource could not be found.
      description: |-
        Returned if the agenda item or meeting does not exist.
    '406':
      $ref: "../components/responses/missing_content_type.yml"
    '415':
      $ref: "../components/responses/unsupported_media_type.yml"
    '422':
      description: |-
        Returned if:

        * a constraint for a property was violated (`PropertyConstraintViolation`)

delete:
  summary: Delete a meeting agenda item
  operationId: delete_meeting_agenda_item
  tags:
    - Meetings
  description: Deletes the agenda item.
  parameters:
    - description: Meeting identifier
      example: 1
      in: path
      name: meeting_id
      required: true
      schema:
        type: integer
    - description: Agenda item identifier
      example: 1
      in: path
      name: id
      required: true
      schema:
        type: integer
  responses:
    '204':
      description: Returned if the agenda item was successfully deleted
    '403':
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/error_response.yml"
          examples:
            response:
              value:
                _type: Error
                errorIdentifier: urn:openproject-org:api:v3:errors:MissingPermission
                message: You are not authorized to access this resource.
      description: |-
        Returned if the client does not have sufficient permissions.

        **Required permission:** manage agendas
    '404':
      content:
        application/hal+json:
          schema:
            $ref: "../components/schemas/error_response.yml"
          examples:
            response:
              value:
                _type: Error
                errorIdentifier: urn:openproject-org:api:v3:errors:NotFound
                message: The requested resource could not be found.
      description: |-
        Returned if the agenda item or meeting does not exist.
