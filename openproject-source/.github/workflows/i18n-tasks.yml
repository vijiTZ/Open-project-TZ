name: i18n-inconsistency-check

on:
  push:
    branches:
      - dev
      - release/*
    paths-ignore:
      - 'docs/**'
      - 'help/**'
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - 'docs/**'
      - 'help/**'
      - 'packaging/**'
      - '.pkgr.yml'

permissions:
  contents: read

jobs:
  i18n-tasks:
    permissions:
      contents: read
    if: github.repository == 'opf/openproject'
    name: I18n inconsistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1

      - name: Setup i18n-tasks
        run: |
          gem install i18n-tasks

      - name: Run inconsistent translations check
        run: |
          i18n-tasks \
            check-consistent-interpolations \
            --config config/i18n-tasks-all-files.yml
