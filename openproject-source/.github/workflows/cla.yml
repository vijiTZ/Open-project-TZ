name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# explicitly configure permissions, in case your GITHUB_TOKEN workflow permissions are set to read-only in repository settings
permissions:
  actions: write
  contents: read # this can be 'read' if the signatures are in remote repository
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    if: github.repository == 'opf/openproject'
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          # https://github.com/contributor-assistant/github-action?tab=readme-ov-file#environmental-variables
          # Built-in GitHub token to make the API calls for interacting with GitHub. Does not need to be specified the secrets store.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Access token for repository where the signatures are stored (see below for remote-repository-name)
          PERSONAL_ACCESS_TOKEN: ${{ secrets.OPENPROJECTCI_GH_LEGAL_TOKEN }}
        with:
          path-to-signatures: "contributor-license-agreement/signatures/version1.json"
          path-to-document: "https://www.openproject.org/legal/contributor-license-agreement" # e.g. a CLA or a DCO document
          # branch should not be protected
          branch: "main"
          allowlist: >
            *[bot]*,
            Copilot,
            Daten-David,
            EinLama,
            HDinger,
            JanKeppler,
            Kharonus,
            Lucas-Knechtel,
            MayaBerd,
