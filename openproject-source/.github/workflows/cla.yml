            bsatarnejad,
            cbliard,
            copilot[bot],
            copilot-swe-agent[bot],
            corinnaguenther,
            crohr,
            dependabot[bot],
            dfriquet,
            dombesz,
            dominic-braeunlein,
            dsteiner,
            dtohmucu,
            fereshtehnm,
            gleone-art,
            ihor-khomenko,
            judithroth,
            klaustopher,
            kluedecke,
            lindenthal,
            machisuji,
            marcalcobe,
            mereghost,
            mrmir,
            myabc,
            oliverguenther,
            openprojectci,
            psatyal,
            samachon,
            shiroginne,
            toy,
