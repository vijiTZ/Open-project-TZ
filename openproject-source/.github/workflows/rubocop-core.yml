name: rubocop

on:
  pull_request:
    paths-ignore:
      - 'docs/**'

jobs:
  rubocop:
    name: rubocop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1
      - name: Run Rubocop
        uses: reviewdog/action-rubocop@b6d5e953a5fc0bf3ab65254e77730ea2174d6d6d # v2
        with:
          github_token: ${{ secrets.github_token }}
          rubocop_version: gemfile
          rubocop_extensions: >
            rubocop-capybara:gemfile
            rubocop-factory_bot:gemfile
            rubocop-openproject:gemfile
            rubocop-performance:gemfile
            rubocop-rails:gemfile
            rubocop-rspec:gemfile
            rubocop-rspec_rails:gemfile
          reporter: github-pr-check
          only_changed: true
      - name: Install erb_lint
        run: gem install -N erb_lint erblint-github
      - name: Run erb-lint
        uses: tk0miya/action-erblint@44c5fe3552356fe8bff23f30d534aa4258aa3f7b # v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
          fail_on_error: true
