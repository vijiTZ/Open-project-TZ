  tooltip_resend_invitation: 'පැරණි එක කල් ඉකුත් වූ විට හෝ පරිශීලකයාට මුල් විද්යුත් තැපෑල නොලැබුනේ නම් නැවුම් ටෝකනයක් සමඟ තවත් ආරාධනා විද්යුත් තැපෑලක් යවයි. ක්රියාකාරී පරිශීලකයින්ට නව සත්යාපන ක්රමයක් තෝරා ගැනීමට ද භාවිතා කළ හැකිය. ක්රියාකාරී පරිශීලකයින් සමඟ භාවිතා කරන විට ඔවුන්ගේ තත්වය ''ආරාධනා'' ලෙස වෙනස් කරනු ලැබේ.

