        sidebar_arrow: Use a seta de retorno no canto superior esquerdo para retornar ao <b>menu principal</b> do projeto.
        welcome: Faça um tour de introdução de três minutos para conhecer os <b>principais recursos</b>. <br> Recomendamos que você siga todas as etapas até o final. O tour pode ser reiniciado a qualquer momento.
        wiki: 'Na <b>wiki</b>, você pode documentar e compartilhar conhecimento junto com sua equipe. '
        boards:
          overview: Selecione <b>quadros</b> para mudar a visão e gerenciar seu projeto usando a exibição de quadros ágeis.
          lists_kanban: Aqui você pode criar várias listas (colunas) dentro do seu painel. Este recurso permite que você crie um <b>Quadro Kanban</b>, por exemplo.
          lists_basic: Aqui você pode criar várias listas (colunas) em seu quadro ágil.
          add: Clique no ícone mais (+) para <b>criar um novo cartão</b> ou <b>adicionar um cartão existente</b> à lista no quadro.
          drag: Arraste e solte seus cartões dentro de uma lista para reordená-los ou movê-los para outra lista. <br> Você pode clicar no ícone de informações (i) no canto superior direito ou clicar duas vezes em um cartão para abrir seus detalhes.
        wp:
          toggler: Agora vamos dar uma olhada na seção <b>pacote de trabalho</b> , que permitirá que você tenha uma visão mais detalhada de seu trabalho.
          list: Esta visão geral do pacote <b>de trabalho</b> fornece uma lista de todo o trabalho em seu projeto, como tarefas, marcos, fases e muito mais. <br> Os pacotes de trabalho podem ser criados e editados diretamente nesta visualização. Para acessar os detalhes de um determinado pacote de trabalho, basta clicar duas vezes na sua linha.
          full_view: A visualização com os <b>detalhes do pacote de trabalho</b> fornece todas as informações relevantes referentes a um determinado pacote de trabalho, como descrição, situação, prioridade, atividades, dependências e comentários.
          back_button: Use a seta de retorno no canto superior esquerdo para sair e retornar à lista de pacotes de trabalho.
          create_button: O botão <b>+ Criar</b> adicionará um novo pacote de trabalho ao seu projeto.
          gantt_menu: Crie planejamentos e cronogramas de projetos sem esforço usando o módulo do gráfico de Gantt.
          timeline: Aqui você pode <b>editar seu plano de projeto</b>, criar novos pacotes de trabalho, tais como tarefas, marcos, fases e muito mais, bem como <b>adicionam dependências</b>. Todos os membros da equipe podem visualizar e atualizar o plano mais recente a qualquer momento.
        team_planner:
          overview: O planejador de equipe permite atribuir tarefas visualmente aos membros da equipe e obter uma visão geral de quem está trabalhando e no quê (onde).
          calendar: O quadro de planejamento semanal ou quinzenal exibe todos os pacotes de trabalho atribuídos aos membros de sua equipe.
          add_assignee: Para começar, adicione responsáveis ao planejador de equipe.
          add_existing: Pesquise pacotes de trabalho existentes e arraste-os para o planejador de equipe para atribuí-los instantaneamente a um membro da equipe e definir as datas de início e término.
          card: Arraste os pacotes de trabalho horizontalmente para movê-los para trás ou para frente no tempo, arraste as bordas para alterar as datas de início e término e arraste-os verticalmente para uma linha diferente para atribuí-los a outro membro.
