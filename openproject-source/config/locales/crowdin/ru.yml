  text_custom_export_logo_instructions: 'Это логотип, который отображается при экспорте в формате PDF. Это должен быть файл изображения в формате PNG или JPEG. Рекомендуется использовать черный или цветной логотип на прозрачном или белом фоне.

    '
  text_custom_export_cover_instructions: 'Это изображение, которое появляется на обложке страницы в экспорте PDF. Он должен быть около 800px ширины на 500px высоты в PNG или JPEG файл изображения.

    '
  text_custom_export_footer_instructions: 'Экспорт PDF будет включать графический элемент, расположенный слева от нижнего колонтитула. Это изображение должно быть PNG или JPEG файлом шириной примерно 200 пикселей.

    '
  label_custom_export_font_instructions: 'Загрузите и управляйте пользовательскими шрифтами TrueType (.ttf), используемыми в экспорте PDF. Для наилучшего результата используйте подходящие файлы из одного и того же семейства шрифтов. Если шрифт отсутствует, будет использоваться шрифт NotoSans по умолчанию.

    '
  label_custom_export_images_instructions: 'Загрузите и управляйте пользовательскими файлами изображений, используемыми в экспорте PDF.

    '
  text_custom_export_font_regular_instructions: 'Это файл шрифта для обычного текста. Он должен быть в формате TTF и является обязательным.

    '
  text_custom_export_font_bold_instructions: 'Это файл шрифта для жирного текста. Он должен быть в формате TTF.

    '
  text_custom_export_font_italic_instructions: 'Это файл шрифта для курсивного текста. Он должен быть в формате TTF.

    '
  text_custom_export_font_bold_italic_instructions: 'Это файл шрифта для жирного и курсивного текста. Он должен быть в формате TTF.

    '
  text_custom_favicon_instructions: 'Это крошечный значок, который появляется в окне / вкладке вашего браузера рядом с заголовком страницы. Это должен быть файл изображения в формате PNG размером 32 на 32 пикселя с прозрачным фоном.

    '
  text_custom_touch_icon_instructions: 'Это значок, который появляется на вашем мобильном устройстве или планшете, когда вы размещаете закладку на своем рабочем столе. Это должен быть файл изображения в формате PNG размером 180 на 180 пикселей в квадрате. Пожалуйста, убедитесь, что фон изображения не прозрачный, иначе это будет плохо смотреться на iOS.

