        description: Destaque as alterações realizadas nesta lista desde qualquer ponto no passado.
      benefits:
        description: Quais os benefícios da edição Enterprise Edition local?
        high_security: Recursos de segurança
        high_security_text: Logon único (SAML, OpenID Connect, CAS), grupos LDAP.
        installation: Suporte à instalação
        installation_text: Engenheiros de software experientes darão orientações durante todo o processo de instalação e configuração em sua própria infraestrutura.
        premium_features: Complementos Enterprise
        premium_features_text: Quadros ágeis, tema e logotipo personalizados, gráficos, fluxos de trabalho inteligentes com ações personalizadas, pesquisa de texto completo em anexos de itens de trabalho e campos personalizados com seleção múltipla.
        professional_support: Suporte profissional
        professional_support_text: Obtenha suporte confiável e próximo de engenheiros de suporte sênior com conhecimento especializado em operar o OpenProject em ambientes críticos para os negócios.
      work_package_subject_generation:
        description: Crie assuntos gerados automaticamente com base em atributos e textos referenciados.
      customize_life_cycle:
        description: Criar e organizar fases do projeto diferentes das fornecidas pelo planejamento do ciclo de projeto PM2.
      capture_external_links:
        description: Evite ataques de engenharia social detectando e alertando sobre links externos antes que os usuários os acessem.
      work_package_query_relation_columns:
        description: Precisa visualizar as relações ou elementos filhos na lista de pacotes de trabalho?
      edit_attribute_groups:
        description: 'Personalize a configuração do formulário com estes complementos adicionais:'
        features:
          groups: Adicionar novos grupos de atributos
          rename: Renomear grupos de atributos
          related: Adicionar uma tabela de pacotes de trabalho relacionados
      readonly_work_packages:
        description: Marcar pacotes de trabalho como somente leitura para determinados status.
      custom_field_hierarchies:
        description: Campos personalizados de hierarquia permitem organizar estruturas hierárquicas nos pacotes de trabalho e projetos por meio de listas de seleção de vários níveis.
      date_alerts:
        description: Com os alertas de data, você será notificado sobre as próximas datas de início ou término para não perder nem esquecer nenhum prazo importante.
      weighted_item_lists:
        description: Listas de itens ponderados permitem criar uma lista com valores numéricos associados.
      work_package_sharing:
        description: Compartilhe pacotes de trabalho com usuários que não são membros do projeto.
      project_list_sharing:
        description: Compartilhar listas de projetos com usuários individuais.
      calculated_values:
        description: Os valores calculados permitem criar um atributo com base em fórmulas matemáticas utilizando valores numéricos, outros atributos do projeto e campos personalizados.
      define_custom_style:
        title: Tema de cor e logotipo personalizados
        more_info: 'Obs.: o logotipo usado pode ser acessado publicamente.'
        description: Personalize a instalação de seu OpenProject com seu logotipo e cores.
      custom_actions:
        title: Ações personalizadas
        description: As ações personalizadas são atalhos de clique único para um conjunto de ações pré-definidas que você pode disponibilizar em certos pacotes de trabalho com base no estado, função, tipo ou projeto.
      mcp_server:
        description: Integre o OpenProject aos seus fluxos de trabalho de IA com um servidor MCP seguro.
      meeting_templates:
        description: Defina modelos de reunião com uma estrutura de pauta predefinida e economize tempo reutilizando-os ao criar novas reuniões.
      nextcloud_sso:
        title: Autenticação única para o armazenamento do Nextcloud
        description: Ative a autenticação segura e contínua para o seu armazenamento Nextcloud com Autenticação única. Simplifique o gerenciamento de acessos e melhore a experiência do usuário.
      scim_api:
        title: Clientes SCIM
        description: Automatize o gerenciamento de usuários no OpenProject integrando de forma contínua serviços de identidade externos como Microsoft Entra ou Keycloak por meio da nossa API SCIM Server. Disponível a partir do plano corporativo Enterprise.
      sso_auth_providers:
        title: Login único (SSO)
        description: Permitir que os usuários façam login por meio de provedores SSO externos usando SAML ou OpenID Connect, garantindo acesso contínuo e integração com os sistemas de identidade existentes.
      virus_scanning:
        description: Garantir que os arquivos carregados no OpenProject sejam verificados quanto à presença de vírus antes de serem acessados por outros usuários.
      project_creation_wizard:
        description: Gerar um assistente detalhado para ajudar os gerentes de projeto a preencher uma solicitação de início de projeto.
      placeholder_users:
        title: Usuários de espaço reservado
        description: 'Usuários de espaço reservado são uma forma de atribuir pacotes de trabalho a pessoas que não fazem parte do seu projeto. Eles podem ser úteis em diversas situações, por exemplo, quando você precisa acompanhar tarefas de um recurso que ainda não foi nomeado ou não está disponível, ou quando não deseja conceder acesso dessa pessoa ao OpenProject, mas ainda quer registrar as tarefas atribuídas a ela.

          '
      internal_comments:
        title: Comentários internos
        description: Comentários internos permitem que a equipe se comunique de forma privada. Eles são visíveis apenas para papéis específicos do projeto e nunca serão acessíveis publicamente.
      internal_comments_inline:
        title: Escreva comentários internos visíveis apenas para um grupo restrito
        description: " "
      portfolio_management:
        description: Alinhe seus projetos aos seus objetivos estratégicos, organizando-os em portfólios e programas.
