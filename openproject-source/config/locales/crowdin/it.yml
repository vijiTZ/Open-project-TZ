      already_have_token: 'Hai già un token? Aggiungilo usando il pulsante qui sotto per aggiornare al piano Enterprise prenotato.

        '
      hide_banner: Nascondi questo banner
      homescreen_description: 'I piani Enterprise estendono l''edizione Community di OpenProject con [componenti aggiuntivi Enterprise](enterprise_url) e supporto professionale, ideali per le organizzazioni che utilizzano OpenProject in ambienti mission-critical.

        '
      homescreen_subline: Effettuando l'aggiornamento supporterai anche un progetto open source.
      baseline_comparison:
        description: Evidenzia le modifiche apportate a questo elenco da qualsiasi punto nel passato.
      benefits:
        description: Quali sono i benefici dell'edizione Enterprise on-premises?
        high_security: Funzionalità di sicurezza
        high_security_text: Single sign on (SAML, OpenID Connect, CAS), gruppi LDAP.
        installation: Assistenza all'installazione
        installation_text: I nostri ingegneri del software esperti ti guidano durante il processo di installazione e configurazione nella tua infrastruttura.
        premium_features: Componenti aggiuntivi Enterprise
        premium_features_text: Tabelloni Agile, tema e logo personalizzati, grafici, flussi di lavoro intelligenti con azioni personalizzate, ricerca completa di allegati nelle macro-attività e campi personalizzati a selezione multipla.
        professional_support: Assistenza professionale
        professional_support_text: Ottieni un supporto affidabile e di livello da esperti tecnici con conoscenze dettagliate sulla gestione di OpenProject in ambienti critici per le imprese.
      work_package_subject_generation:
        description: Crea oggetti generati automaticamente utilizzando gli attributi e il testo di riferimento.
      customize_life_cycle:
        description: Crea e organizza fasi di progetto diverse da quelle forniti dalla pianificazione del ciclo di progetto PM2.
      capture_external_links:
        description: Previeni gli attacchi di ingegneria sociale intercettando e avvisando gli utenti dei link esterni prima che li visitino.
      work_package_query_relation_columns:
        description: Vuoi visualizzare le relazioni o gli elementi figlio nell'elenco di macro-attività?
      edit_attribute_groups:
        description: 'Personalizza la configurazione del modulo con le seguenti aggiunte:'
        features:
          groups: Aggiunta di gruppi di proprietà
          rename: Rinomina gruppi di attributi
          related: Aggiungi una tabella delle relative macro-attività
      readonly_work_packages:
        description: Contrassegna le macro-attività come in sola lettura per stati specifici.
      custom_field_hierarchies:
        description: I campi personalizzati gerarchici consentono di organizzare strutture gerarchiche di macro-attività e progetti utilizzando elenchi di selezione multilivello.
      date_alerts:
        description: Con gli avvisi sulle date, sarai avvisato delle prossime date di inizio o di fine in modo da non perdere mai o dimenticare una scadenza importante.
      weighted_item_lists:
        description: Gli elenchi ponderati consentono di creare un elenco a cui sono associati valori numerici sottostanti.
      work_package_sharing:
        description: Condividi macro-attività con utenti che non sono membri del progetto.
      project_list_sharing:
        description: Condividi gli elenchi dei progetti con singoli utenti.
      calculated_values:
        description: I valori calcolati consentono di creare un attributo basato su una formula matematica che utilizza valori numerici, altri attributi di progetto e campi personalizzati.
      define_custom_style:
        title: Tema e logo a colori personalizzati
        more_info: 'Nota: il logo utilizzato sarà accessibile al pubblico.'
        description: Personalizza la tua installazione OpenProject con il tuo logo e i tuoi colori.
      custom_actions:
        title: Azioni personalizzate
        description: Le azioni personalizzate sono scorciatoie che con un clic ti consentono di eseguire una serie di azioni predefinite che è possibile rendere disponibili su determinate macro-attività in base a stato, ruolo, tipo o progetto.
      mcp_server:
        description: Integra OpenProject nei tuoi flussi di lavoro di intelligenza artificiale con un server MCP sicuro.
      meeting_templates:
        description: Definisci modelli di riunione con una struttura di agenda definita e risparmia tempo riutilizzandoli quando crei nuove riunioni.
      nextcloud_sso:
        title: Single Sign-On per Nextcloud Storage
        description: Abilita un'autenticazione veloce e sicura per il tuo archivio Nextcloud con Single Sign-On. Semplifica la gestione degli accessi e migliora la praticità per l'utente.
      scim_api:
        title: Client SCIM
        description: Automatizza la gestione degli utenti in OpenProject integrando perfettamente servizi di identità esterni come Microsoft Entra o Keycloak attraverso la nostra API Server SCIM. Disponibile a partire dal piano aziendale Enterprise.
      sso_auth_providers:
        title: Single Sign-On (SSO)
        description: Consenti agli utenti di accedere tramite provider SSO esterni utilizzando SAML o OpenID Connect, per un accesso fluido e un'integrazione con i sistemi di identità esistenti.
      virus_scanning:
        description: Assicurati che i file caricati in OpenProject vengano scansionati alla ricerca di virus prima di renderli accessibili ad altri utenti.
      project_creation_wizard:
        description: Genera una procedura guidata passo dopo passo per aiutare i project manager a compilare una richiesta di avvio del progetto.
      placeholder_users:
        title: Utenti segnaposto
        description: 'Gli utenti segnaposto sono un modo per assegnare macro-attività a utenti che non fanno parte del tuo progetto. Possono essere utili in una vasta gamma di scenari: ad esempio, quando occorre tenere traccia delle attività per una risorsa che non è ancora nominata o disponibile, o se non si desidera concedere a quella persona l''accesso a OpenProject ma si desidera comunque tenere traccia delle attività assegnate.

          '
      internal_comments:
        title: Commenti interni
        description: I commenti interni consentono a un team interno di comunicare privatamente. Questi sono visibili solo ad alcuni ruoli di progetto e non saranno mai visibili pubblicamente.
      internal_comments_inline:
        title: Scrivi commenti interni che solo un piccolo gruppo può vedere
        description: " "
      portfolio_management:
        description: Allinea i tuoi progetti ai tuoi obiettivi strategici organizzandoli in portfolio e programmi.
