        installation_text: Erfarne software ingeniører guide dig gennem den komplette installation og setup proces i din egen infrastruktur.
        premium_features: Enterprise add-ons
        premium_features_text: Agile tavler, brugerdefineret tema og logo, grafer, intelligente arbejdsgange med brugerdefinerede handlinger, fuld tekst søgning efter vedhæftede filer arbejde og multi-valgs brugerdefinerede felter.
        professional_support: Professionel support
        professional_support_text: Få pålidelig, høj-touch support fra senior support ingeniører med ekspert viden om at køre OpenProject i forretningskritiske miljøer.
