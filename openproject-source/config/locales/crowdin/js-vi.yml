      buttons:
        skip: bỏ qua
        next: Tiếp
        got_it: Hiểu rồi
      steps:
        help_menu: Menu Trợ giúp (?) cung cấp <b>các tài nguyên trợ giúp bổ sung</b>. Tại đây bạn có thể tìm thấy hướng dẫn người dùng, video hướng dẫn hữu ích và nhiều hơn nữa. <br> Chúc bạn làm việc vui vẻ với OpenProject!
        members: Mời <b>thành viên</b> mới tham gia dự án của bạn.
        quick_add_button: Nhấp vào biểu tượng dấu cộng (+) trong điều hướng tiêu đề để <b>tạo dự án mới</b> hoặc để <b>mời đồng nghiệp</b>.
        sidebar_arrow: Sử dụng mũi tên quay lại ở góc trên cùng bên trái để quay lại <b>menu chính</b> của dự án.
        welcome: Hãy tham gia chuyến tham quan giới thiệu dài ba phút để tìm hiểu <b>tính năng quan trọng nhất</b>. <br> Chúng tôi khuyên bạn nên hoàn thành các bước cho đến hết. Bạn có thể bắt đầu lại chuyến tham quan bất cứ lúc nào.
        wiki: Trong <b>wiki</b> bạn có thể ghi lại và chia sẻ kiến ​​thức cùng với nhóm của mình.
        boards:
          overview: Chọn <b>boards</b> để thay đổi chế độ xem và quản lý dự án của bạn bằng chế độ xem bảng linh hoạt.
          lists_kanban: 'Tại đây bạn có thể tạo nhiều danh sách (cột) trong bảng của mình. Ví dụ: tính năng này cho phép bạn tạo <b>Kanban board</b>.'
          lists_basic: Tại đây, bạn có thể tạo nhiều danh sách (cột) trong bảng linh hoạt của mình.
          add: Bấm vào biểu tượng dấu cộng (+) để <b>tạo thẻ mới</b> hoặc <b>thêm thẻ hiện có</b> vào danh sách trên bảng.
          drag: Kéo và thả thẻ của bạn trong danh sách nhất định để sắp xếp lại chúng hoặc di chuyển chúng sang danh sách khác. <br> Bạn có thể nhấp vào biểu tượng thông tin (i) ở góc trên bên phải hoặc nhấp đúp vào thẻ để mở thông tin chi tiết.
        wp:
          toggler: Bây giờ chúng ta hãy xem phần <b>work package</b>, phần này sẽ cung cấp cho bạn cái nhìn chi tiết hơn về công việc của bạn.
          list: Tổng quan về gói <b>work</b> này cung cấp danh sách tất cả công việc trong dự án của bạn, chẳng hạn như nhiệm vụ, cột mốc, giai đoạn, v.v. <br> Các gói công việc có thể được tạo và chỉnh sửa trực tiếp từ chế độ xem này. Để truy cập chi tiết của một gói công việc cụ thể, chỉ cần nhấp đúp vào hàng của nó.
          full_view: Chế độ xem <b>chi tiết gói công việc</b> cung cấp tất cả thông tin liên quan liên quan đến gói công việc nhất định, chẳng hạn như mô tả, trạng thái, mức độ ưu tiên, hoạt động, sự phụ thuộc và nhận xét.
          back_button: Sử dụng mũi tên quay lại ở góc trên cùng bên trái để thoát và quay lại danh sách gói công việc.
          create_button: Nút <b>+ Create</b> sẽ thêm gói công việc mới vào dự án của bạn.
          gantt_menu: Tạo lịch trình và mốc thời gian của dự án một cách dễ dàng bằng cách sử dụng mô-đun biểu đồ Gantt.
          timeline: Tại đây, bạn có thể <b>chỉnh sửa kế hoạch dự án của mình</b>, tạo các gói công việc mới, chẳng hạn như nhiệm vụ, mốc quan trọng, giai đoạn, v.v., cũng như <b>thêm các phần phụ thuộc</b>. Tất cả thành viên trong nhóm có thể xem và cập nhật kế hoạch mới nhất bất cứ lúc nào.
        team_planner:
          overview: Công cụ lập kế hoạch nhóm cho phép bạn phân công nhiệm vụ cho các thành viên trong nhóm một cách trực quan và có được cái nhìn tổng quan về ai đang làm việc gì.
          calendar: Bảng kế hoạch hàng tuần hoặc hai tuần một lần hiển thị tất cả các gói công việc được giao cho các thành viên trong nhóm của bạn.
          add_assignee: Để bắt đầu, hãy thêm người được phân công vào người lập kế hoạch nhóm.
          add_existing: Tìm kiếm các gói công việc hiện có và kéo chúng vào bảng lập kế hoạch nhóm để phân công ngay cho một thành viên trong nhóm cũng như xác định ngày bắt đầu và ngày kết thúc.
          card: Kéo các gói công việc theo chiều ngang để di chuyển chúng tới hoặc lui theo thời gian, kéo các cạnh để thay đổi ngày bắt đầu và ngày kết thúc, thậm chí kéo chúng theo chiều dọc đến một hàng khác để gán chúng cho thành viên khác.
