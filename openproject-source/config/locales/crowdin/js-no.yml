          add_assignee: For å komme i gang, legg til utførende i gruppeplanleggeren.
          add_existing: Søk etter eksisterende arbeidspakker og dra dem til gruppeplanleggeren for å umiddelbart tildele dem til et gruppemedlem og definere start- og sluttdato.
