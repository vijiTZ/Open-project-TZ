          toggler: La oss nå se på seksjonen <b>arbeidspakke</b> som gir deg en mer detaljert visning av arbeidet ditt.
          list: Denne <b>arbeidspakke</b>-oversikten viser en liste over alt arbeidet i ditt prosjekt, som oppgaver, milepæler, faser m.m.<br>Arbeidspakker kan opprettes og redigeres fra denne visningen.  For p se detaljer i den enkelte arbeidspakke, er det bare å dobbeltklikke på raden.
