          create_button: "<b>+ Opprett</b>-knappen vil legge til en ny nettverkspakke til ditt prosjekt."
          gantt_menu: Opprett prosjektplaner og tidslinjer uanstrengt ved hjelp av Gantt-kartmodulen.
          timeline: Her kan du <b>redigere prosjektplanen din</b>, opprette nye nettverkspakker som oppgaver, milepæler, fases og mer, og også <b>legge til avhengigheter</b>.  Alle medlemmer kan se og oppdatere de siste planene til enhver tid.
