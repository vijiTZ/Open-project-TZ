        '
      hide_banner: Ẩn biểu ngữ này
      homescreen_description: 'Các gói doanh nghiệp mở rộng phiên bản Cộng đồng của OpenProject với [Enterprise add-ons](enterprise_url) bổ sung và hỗ trợ chuyên nghiệp, lý tưởng cho các tổ chức chạy OpenProject trong môi trường quan trọng.

        '
      homescreen_subline: Bằng cách nâng cấp, bạn cũng sẽ hỗ trợ một dự án nguồn mở.
      baseline_comparison:
        description: Đánh dấu những thay đổi được thực hiện trong danh sách này kể từ bất kỳ thời điểm nào trong quá khứ.
      benefits:
        description: Lợi ích của phiên bản Enterprise tại chỗ là gì?
        high_security: Tính năng bảo mật
        high_security_text: Đăng nhập một lần (SAML, OpenID Connect, CAS), nhóm LDAP.
        installation: Hỗ trợ cài đặt
        installation_text: Các kỹ sư phần mềm có kinh nghiệm sẽ hướng dẫn bạn thực hiện quá trình cài đặt và thiết lập hoàn chỉnh trong cơ sở hạ tầng của riêng bạn.
        premium_features: Tiện ích bổ sung dành cho doanh nghiệp
        premium_features_text: Bảng linh hoạt, chủ đề và logo tùy chỉnh, đồ thị, quy trình làm việc thông minh với các hành động tùy chỉnh, tìm kiếm toàn văn cho tệp đính kèm gói công việc và các trường tùy chỉnh nhiều lựa chọn.
        professional_support: Hỗ trợ chuyên nghiệp
        professional_support_text: Nhận được sự hỗ trợ đáng tin cậy, liên tục từ các kỹ sư hỗ trợ cấp cao có kiến ​​thức chuyên môn về việc chạy OpenProject trong các môi trường quan trọng trong kinh doanh.
      work_package_subject_generation:
        description: Tạo chủ đề được tạo tự động bằng cách sử dụng các thuộc tính và văn bản được tham chiếu.
      customize_life_cycle:
        description: Tạo và tổ chức các giai đoạn dự án khác với các giai đoạn được cung cấp bởi việc lập kế hoạch chu trình dự án PM2.
      capture_external_links:
        description: Ngăn chặn các cuộc tấn công xã hội bằng cách phát hiện và cảnh báo về các liên kết bên ngoài trước khi người dùng truy cập vào chúng.
      work_package_query_relation_columns:
        description: Cần xem các mối quan hệ hoặc các phần tử con trong danh sách gói công việc?
      edit_attribute_groups:
        description: 'Tùy chỉnh cấu hình biểu mẫu với các tiện ích bổ sung sau:'
        features:
          groups: Thêm nhóm thuộc tính mới
          rename: Đổi tên nhóm thuộc tính
          related: Thêm bảng các gói công việc liên quan
      readonly_work_packages:
        description: Đánh dấu các gói công việc là chỉ đọc đối với các trạng thái cụ thể.
      custom_field_hierarchies:
        description: Các trường tùy chỉnh phân cấp cho phép tổ chức các cấu trúc phân cấp trong các gói công việc và dự án bằng cách sử dụng danh sách chọn nhiều cấp.
      date_alerts:
        description: Với tính năng cảnh báo ngày, bạn sẽ được thông báo về ngày bắt đầu hoặc ngày kết thúc sắp tới để không bao giờ bỏ lỡ hoặc quên thời hạn quan trọng.
      weighted_item_lists:
        description: Danh sách mục có trọng số cho phép bạn tạo danh sách có các giá trị số cơ bản được liên kết.
      work_package_sharing:
        description: Chia sẻ các gói công việc với người dùng không phải là thành viên của dự án.
      project_list_sharing:
        description: Chia sẻ danh sách dự án với người dùng cá nhân.
      calculated_values:
        description: Các giá trị được tính toán cho phép bạn tạo thuộc tính dựa trên công thức toán học bằng cách sử dụng các giá trị số cũng như các thuộc tính dự án và trường tùy chỉnh khác.
      define_custom_style:
        title: Chủ đề và logo màu tùy chỉnh
        more_info: 'Lưu ý: logo được sử dụng sẽ có thể truy cập công khai.'
        description: Tùy chỉnh cài đặt OpenProject bằng logo và màu sắc của riêng bạn.
      custom_actions:
        title: Hành động tùy chỉnh
        description: Hành động tùy chỉnh là các phím tắt bằng một cú nhấp chuột tới một tập hợp các hành động được xác định trước mà bạn có thể cung cấp trên các gói công việc nhất định dựa trên trạng thái, vai trò, loại hoặc dự án.
      mcp_server:
        description: Bring OpenProject into your AI workflows with a secure MCP server.
      meeting_templates:
        description: Define meeting templates with a set agenda structure and save time by reusing them when creating new meetings.
      nextcloud_sso:
        title: Đăng nhập một lần để lưu trữ Nextcloud
        description: Cho phép xác thực liền mạch và an toàn cho bộ lưu trữ Nextcloud của bạn bằng Đăng nhập một lần. Đơn giản hóa việc quản lý truy cập và nâng cao sự thuận tiện cho người dùng.
      scim_api:
        title: khách hàng SCIM
        description: Tự động hóa việc quản lý người dùng trong OpenProject bằng cách tích hợp liền mạch các dịch vụ nhận dạng bên ngoài như Microsoft Entra hoặc Keycloak thông qua API máy chủ SCIM của chúng tôi. Có sẵn bắt đầu với gói doanh nghiệp Enterprise.
      sso_auth_providers:
        title: Đăng nhập một lần (SSO)
        description: Cho phép người dùng đăng nhập thông qua các nhà cung cấp SSO bên ngoài bằng SAML hoặc OpenID Connect để truy cập và tích hợp liền mạch với các hệ thống nhận dạng hiện có.
      virus_scanning:
        description: Đảm bảo các tệp được tải lên trong OpenProject được quét vi-rút trước khi người dùng khác có thể truy cập được.
      project_creation_wizard:
        description: Tạo một trình hướng dẫn từng bước để hỗ trợ các nhà quản lý dự án điền vào đơn yêu cầu khởi tạo dự án.
      placeholder_users:
        title: Người dùng giữ chỗ
        description: 'Người dùng giữ chỗ là một cách để gán các gói công việc cho những người dùng không thuộc dự án của bạn. Chúng có thể hữu ích trong nhiều tình huống khác nhau; ví dụ: nếu bạn cần theo dõi các nhiệm vụ cho một tài nguyên chưa được đặt tên hoặc chưa có sẵn hoặc nếu bạn không muốn cấp cho người đó quyền truy cập vào OpenProject nhưng vẫn muốn theo dõi các nhiệm vụ được giao cho họ.

          '
      internal_comments:
        title: Bình luận nội bộ
        description: Nhận xét nội bộ cho phép một nhóm nội bộ liên lạc riêng tư với nhau. Những thông tin này chỉ hiển thị với một số vai trò dự án nhất định và sẽ không bao giờ hiển thị công khai.
      internal_comments_inline:
        title: Viết bình luận nội bộ chỉ một nhóm nhỏ mới có thể xem
        description: " "
      portfolio_management:
        description: Điều chỉnh các dự án của bạn theo mục tiêu chiến lược bằng cách sắp xếp chúng thành danh mục đầu tư và chương trình.
