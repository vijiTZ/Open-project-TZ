    '
  text_project_custom_field_html: 'Phiên bản Enterprise sẽ thêm các phần bổ sung cho các trường tùy chỉnh của dự án: <br> <ul> <li><b>Thêm các trường tùy chỉnh cho dự án vào danh sách Dự án của bạn để tạo cái nhìn tổng quan về danh mục dự án</b></li> </ul>

    '
  text_custom_logo_instructions: 'Logo tự động chia tỷ lệ để vừa với tiêu đề. Để có kết quả tốt nhất, hãy tải lên biểu tượng màu trắng trên hình ảnh trong suốt có kích thước 130×47px. Bạn có thể thêm bao nhiêu khoảng cách bên trong hình ảnh đó tùy thích.

    '
  text_custom_logo_mobile_instructions: 'Logo tự động chia tỷ lệ để vừa với tiêu đề. Để có kết quả tốt nhất, hãy tải lên biểu tượng màu trắng trên hình ảnh trong suốt có kích thước 130×33px. Bạn có thể thêm bao nhiêu khoảng cách bên trong hình ảnh đó tùy thích.

    '
  text_custom_export_logo_instructions: 'Đây là logo xuất hiện trong bản xuất PDF của bạn. Nó cần phải là tệp hình ảnh PNG hoặc JPEG. Nên sử dụng biểu tượng màu đen hoặc màu trên nền trong suốt hoặc trắng.

    '
  text_custom_export_cover_instructions: 'Đây là hình ảnh xuất hiện dưới nền trang bìa trong bản xuất PDF của bạn. Nó cần phải có kích thước tệp hình ảnh PNG hoặc JPEG có chiều rộng khoảng 800px x chiều cao khoảng 500px.

    '
  text_custom_export_footer_instructions: 'Xuất PDF sẽ bao gồm một phần tử đồ họa được đặt ở bên trái chân trang. Hình ảnh này phải là tệp PNG hoặc JPEG có chiều rộng khoảng 200 pixel.

    '
  label_custom_export_font_instructions: 'Tải lên và quản lý phông chữ TrueType (.ttf) tùy chỉnh được sử dụng trong bản xuất PDF của bạn. Để có kết quả tốt nhất, hãy sử dụng các tệp phù hợp từ cùng một họ phông chữ. Nếu không có phông chữ nào được cung cấp thì phông chữ NotoSans mặc định sẽ được sử dụng.

    '
  label_custom_export_images_instructions: 'Tải lên và quản lý các tệp hình ảnh tùy chỉnh được sử dụng trong bản xuất PDF của bạn.

    '
  text_custom_export_font_regular_instructions: 'Đây là tập tin phông chữ cho văn bản thông thường. Nó cần phải ở định dạng TTF và được yêu cầu.

    '
  text_custom_export_font_bold_instructions: 'Đây là tập tin phông chữ cho văn bản in đậm. Nó cần phải ở định dạng TTF.

    '
  text_custom_export_font_italic_instructions: 'Đây là tập tin phông chữ cho văn bản in nghiêng. Nó cần phải ở định dạng TTF.

    '
  text_custom_export_font_bold_italic_instructions: 'Đây là tập tin phông chữ cho văn bản in đậm và in nghiêng. Nó cần phải ở định dạng TTF.

    '
  text_custom_favicon_instructions: 'Đây là biểu tượng nhỏ xuất hiện trong cửa sổ/tab trình duyệt của bạn bên cạnh tiêu đề trang. Nó phải là tệp hình ảnh PNG bình phương có kích thước 32 x 32 pixel với nền trong suốt.

    '
  text_custom_touch_icon_instructions: 'Đây là biểu tượng xuất hiện trên điện thoại di động hoặc máy tính bảng của bạn khi bạn đặt dấu trang trên màn hình chính. Nó phải là tệp hình ảnh PNG có kích thước 180 x 180 pixel bình phương. Vui lòng đảm bảo nền của hình ảnh không trong suốt, nếu không nó sẽ trông xấu trên iOS.

    '
