        Ví dụ: ou=users,dc=example,dc=com
      filter_string: |
        Thêm bộ lọc RFC4515 tùy chọn để áp dụng cho kết quả trả về cho người dùng được lọc trong LDAP.
        Điều này có thể được sử dụng để hạn chế nhóm người dùng được OpenProject tìm thấy để xác thực và đồng bộ hóa nhóm.
