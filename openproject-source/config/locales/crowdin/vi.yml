        instructions_html: 'Chọn hành động để thực hiện đối với các tệp có virus đã được phát hiện: <br/> <ul> <li><strong>%{quarantine_option}</strong>: Cách ly tệp, ngăn chặn người dùng truy cập vào nó. Các quản trị viên có thể xem và xóa các tệp đã cách ly trong quản trị.</li> <li><strong>%{delete_option}</strong>: Xóa tệp ngay lập tức.</li> </ul>

          '
